<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Software Fluency — Reference</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0f12;
    --surface: #141720;
    --surface2: #1c2030;
    --border: #252a38;
    --accent: #4af0a0;
    --accent2: #3db8ff;
    --accent3: #ff6b6b;
    --accent4: #ffd166;
    --text: #e2e8f0;
    --text-dim: #7a8499;
    --text-faint: #3d4459;
    --mono: 'IBM Plex Mono', monospace;
    --sans: 'IBM Plex Sans', sans-serif;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* HEADER */
  header {
    padding: 28px 32px 0;
    border-bottom: 1px solid var(--border);
  }

  .header-top {
    display: flex;
    align-items: baseline;
    gap: 14px;
    margin-bottom: 20px;
  }

  .logo {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--accent);
    letter-spacing: 0.18em;
    text-transform: uppercase;
    opacity: 0.8;
  }

  h1 {
    font-size: 22px;
    font-weight: 300;
    letter-spacing: -0.02em;
    color: var(--text);
  }

  h1 span { color: var(--accent); font-weight: 600; }

  /* SEARCH */
  .search-bar {
    position: relative;
    margin-bottom: 0;
  }

  .search-bar input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-bottom: none;
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    padding: 11px 14px 11px 38px;
    outline: none;
    border-radius: 6px 6px 0 0;
    transition: border-color 0.2s;
  }

  .search-bar input:focus { border-color: var(--accent); }
  .search-bar input::placeholder { color: var(--text-faint); }

  .search-icon {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-faint);
    font-size: 14px;
  }

  #result-count {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-faint);
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
  }

  /* TABS */
  .tabs {
    display: flex;
    gap: 0;
    overflow-x: auto;
    scrollbar-width: none;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 0;
  }

  .tabs::-webkit-scrollbar { display: none; }

  .tab {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-faint);
    padding: 10px 16px;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    white-space: nowrap;
    transition: all 0.15s;
    flex-shrink: 0;
  }

  .tab:hover { color: var(--text-dim); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  .tab-dot {
    display: inline-block;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    margin-right: 6px;
    vertical-align: middle;
    position: relative;
    top: -1px;
  }

  /* MAIN LAYOUT */
  .main {
    display: flex;
    flex: 1;
    overflow: hidden;
    height: calc(100vh - 160px);
  }

  /* TERM LIST */
  .term-list {
    width: 280px;
    flex-shrink: 0;
    overflow-y: auto;
    border-right: 1px solid var(--border);
    background: var(--surface);
  }

  .term-list::-webkit-scrollbar { width: 4px; }
  .term-list::-webkit-scrollbar-track { background: transparent; }
  .term-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .term-item {
    padding: 12px 16px;
    cursor: pointer;
    border-bottom: 1px solid var(--border);
    transition: background 0.1s;
    display: flex;
    align-items: flex-start;
    gap: 10px;
  }

  .term-item:hover { background: var(--surface2); }
  .term-item.active { background: var(--surface2); border-left: 2px solid var(--accent); padding-left: 14px; }

  .term-cat-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    flex-shrink: 0;
    margin-top: 5px;
  }

  .term-name {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text);
    line-height: 1.4;
  }

  .term-item.active .term-name { color: var(--accent); }

  .term-preview {
    font-size: 11px;
    color: var(--text-faint);
    margin-top: 2px;
    line-height: 1.4;
    overflow: hidden;
    display: -webkit-box;
    -webkit-line-clamp: 1;
    -webkit-box-orient: vertical;
  }

  /* DETAIL PANEL */
  .detail {
    flex: 1;
    overflow-y: auto;
    padding: 32px 40px;
  }

  .detail::-webkit-scrollbar { width: 4px; }
  .detail::-webkit-scrollbar-track { background: transparent; }
  .detail::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .detail-empty {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: var(--text-faint);
    text-align: center;
  }

  .detail-empty .big { font-size: 48px; margin-bottom: 16px; }
  .detail-empty p { font-size: 13px; font-family: var(--mono); }

  .detail-cat {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .detail-title {
    font-size: 28px;
    font-weight: 600;
    letter-spacing: -0.03em;
    margin-bottom: 6px;
    color: var(--text);
  }

  .detail-aka {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-faint);
    margin-bottom: 24px;
  }

  .detail-body {
    font-size: 14px;
    line-height: 1.75;
    color: var(--text-dim);
    max-width: 680px;
    margin-bottom: 28px;
  }

  .detail-body strong { color: var(--text); font-weight: 500; }

  .detail-section {
    margin-bottom: 24px;
    max-width: 680px;
  }

  .detail-section-title {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-faint);
    margin-bottom: 10px;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--border);
  }

  .detail-section p {
    font-size: 13px;
    line-height: 1.7;
    color: var(--text-dim);
  }

  .detail-section p + p { margin-top: 8px; }

  .tag-list { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }

  .tag {
    font-family: var(--mono);
    font-size: 10px;
    padding: 3px 8px;
    border-radius: 3px;
    border: 1px solid var(--border);
    color: var(--text-dim);
    cursor: pointer;
    transition: all 0.15s;
  }

  .tag:hover { border-color: var(--accent2); color: var(--accent2); }

  .code-block {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 14px 16px;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--accent);
    line-height: 1.6;
    margin-top: 10px;
    white-space: pre-wrap;
    word-break: break-word;
  }

  .analogy-block {
    background: linear-gradient(135deg, rgba(74,240,160,0.04), rgba(61,184,255,0.04));
    border: 1px solid rgba(74,240,160,0.15);
    border-radius: 6px;
    padding: 14px 16px;
    font-size: 13px;
    color: var(--text-dim);
    line-height: 1.65;
    margin-top: 10px;
  }

  .analogy-block .label {
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 0.14em;
    color: var(--accent);
    margin-bottom: 6px;
    display: block;
  }

  /* EMPTY SEARCH */
  .no-results {
    padding: 24px 16px;
    text-align: center;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-faint);
  }

  /* CATEGORY COLORS */
  .c-arch { color: #4af0a0; }
  .c-dsa { color: #3db8ff; }
  .c-dist { color: #ff6b6b; }
  .c-devops { color: #ffd166; }
  .c-db { color: #c084fc; }
  .c-web { color: #fb923c; }
  .c-sec { color: #f472b6; }
  .c-lang { color: #a3e635; }

  .bg-arch { background: #4af0a0; }
  .bg-dsa { background: #3db8ff; }
  .bg-dist { background: #ff6b6b; }
  .bg-devops { background: #ffd166; }
  .bg-db { background: #c084fc; }
  .bg-web { background: #fb923c; }
  .bg-sec { background: #f472b6; }
  .bg-lang { background: #a3e635; }

  mark {
    background: rgba(74,240,160,0.25);
    color: var(--accent);
    border-radius: 2px;
    padding: 0 1px;
  }

  #random-btn {
    margin-left: auto;
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 6px 14px;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.15s;
    align-self: center;
  }

  #random-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
  }
</style>
</head>
<body>

<header>
  <div class="header-top">
    <span class="logo">// ref</span>
    <h1>Software <span>Fluency</span></h1>
    <button id="random-btn" onclick="pickRandom()">⚄ Random</button>
  </div>
  <div class="search-bar">
    <span class="search-icon">⌕</span>
    <input type="text" id="search" placeholder="Search terms, concepts, patterns..." autocomplete="off" spellcheck="false">
    <span id="result-count"></span>
  </div>
  <div class="tabs" id="tabs"></div>
</header>

<div class="main">
  <div class="term-list" id="term-list"></div>
  <div class="detail" id="detail">
    <div class="detail-empty">
      <div class="big">⌨</div>
      <p>Select a term to explore it.</p>
    </div>
  </div>
</div>

<script>
const CATS = [
  { id: 'all',    label: 'All',          color: '#7a8499' },
  { id: 'arch',   label: 'Architecture', color: '#4af0a0' },
  { id: 'dsa',    label: 'Data Structs', color: '#3db8ff' },
  { id: 'dist',   label: 'Distributed',  color: '#ff6b6b' },
  { id: 'devops', label: 'DevOps/CI',    color: '#ffd166' },
  { id: 'db',     label: 'Databases',    color: '#c084fc' },
  { id: 'web',    label: 'Web / API',    color: '#fb923c' },
  { id: 'sec',    label: 'Security',     color: '#f472b6' },
  { id: 'lang',   label: 'Paradigms',    color: '#a3e635' },
];

const TERMS = [
  // ── ARCHITECTURE ──────────────────────────────────────────────────────────
  {
    id: 'solid', cat: 'arch', name: 'SOLID Principles', aka: 'S O L I D',
    summary: 'Five foundational object-oriented design principles that produce maintainable, extensible code.',
    body: `<strong>SOLID</strong> is an acronym for five design principles that guide how software components should be structured and relate to each other. They are language-agnostic and apply at the class/module level.<br><br>
<strong>S — Single Responsibility:</strong> A class should have one reason to change. Don't mix UI logic with business logic with persistence.<br>
<strong>O — Open/Closed:</strong> Open for extension, closed for modification. Add behavior via new code, not by changing existing code.<br>
<strong>L — Liskov Substitution:</strong> Subtypes must be substitutable for their base types without breaking correctness.<br>
<strong>I — Interface Segregation:</strong> Clients shouldn't depend on interfaces they don't use. Prefer many small interfaces over one fat one.<br>
<strong>D — Dependency Inversion:</strong> Depend on abstractions, not concretions. High-level modules shouldn't import low-level ones directly.`,
    analogy: 'Like circuit board design: each module does one thing (S), you add capability via daughter boards not rewiring the motherboard (O), and you communicate through defined connector standards not direct wire bonds (D).',
    tags: ['OOP', 'design principles', 'modularity', 'coupling'],
    related: ['dependency-injection', 'design-patterns', 'coupling']
  },
  {
    id: 'design-patterns', cat: 'arch', name: 'Design Patterns', aka: 'GoF Patterns',
    summary: 'Reusable solutions to commonly occurring problems in software design — a shared vocabulary for developers.',
    body: `Design patterns are named, documented templates for solving recurring design problems. They come in three families:<br><br>
<strong>Creational</strong> (how objects are created): Factory, Abstract Factory, Singleton, Builder, Prototype.<br>
<strong>Structural</strong> (how objects are composed): Adapter, Bridge, Composite, Decorator, Facade, Proxy.<br>
<strong>Behavioral</strong> (how objects communicate): Observer, Strategy, Command, Iterator, State, Template Method.<br><br>
The value isn't copy-pasting code — it's having a name for a solution so a team can say "let's use an Observer here" and everyone understands immediately.`,
    analogy: 'Like standard schematic symbols — you could draw every transistor from scratch, but using standard symbols lets everyone read the schematic instantly.',
    tags: ['GoF', 'OOP', 'factory', 'observer', 'singleton', 'decorator'],
    related: ['solid', 'coupling', 'dependency-injection']
  },
  {
    id: 'microservices', cat: 'arch', name: 'Microservices', aka: 'Service-Oriented Architecture (SOA)',
    summary: 'An architectural style that structures an application as a collection of small, independently deployable services, each owning its own data.',
    body: `In a microservices architecture, a large application is decomposed into small services that each do one thing. Each service:<br>
• Runs in its own process<br>
• Has its own database (no shared state)<br>
• Communicates over a network (HTTP/REST, gRPC, or message queues)<br>
• Can be deployed, scaled, and updated independently<br><br>
<strong>Contrast with a Monolith</strong> — a single deployable unit where all code runs in one process. Monoliths are simpler early on; microservices pay off at scale.<br><br>
<strong>Tradeoffs:</strong> Microservices add network latency, distributed system complexity, and operational overhead in exchange for independent scaling and fault isolation.`,
    analogy: 'Like a distributed embedded system with multiple MCUs on a CAN bus, each handling a specific subsystem — vs. one giant MCU trying to do everything.',
    tags: ['distributed', 'scalability', 'decomposition', 'API'],
    related: ['api-gateway', 'event-driven', 'docker', 'service-mesh']
  },
  {
    id: 'coupling', cat: 'arch', name: 'Coupling & Cohesion', aka: 'Tight vs. Loose Coupling',
    summary: 'Two key metrics for software quality: coupling measures interdependency between modules; cohesion measures how focused a module is.',
    body: `<strong>Coupling</strong> describes how much one module depends on the internals of another. Low (loose) coupling is desirable — changes in one module don't ripple through the system.<br><br>
<strong>Cohesion</strong> describes how related the responsibilities within a single module are. High cohesion is desirable — a module that does one coherent thing is easier to understand and test.<br><br>
The mantra: <em>low coupling, high cohesion</em>. A module that is tightly coupled to many others and handles unrelated concerns is a maintenance nightmare.`,
    code: `// Tight coupling — UserService knows DB internals\nclass UserService:\n    def get_user(id):\n        return db.execute("SELECT * FROM users WHERE id=?", id)\n\n// Loose coupling — depends on abstraction\nclass UserService:\n    def __init__(self, repo: UserRepository):\n        self.repo = repo\n    def get_user(id):\n        return self.repo.find(id)`,
    tags: ['modularity', 'dependency', 'abstraction'],
    related: ['solid', 'dependency-injection', 'design-patterns']
  },
  {
    id: 'dependency-injection', cat: 'arch', name: 'Dependency Injection', aka: 'DI / IoC',
    summary: 'A pattern where a component receives its dependencies from outside rather than creating them itself — enabling testability and flexibility.',
    body: `Dependency Injection (DI) is a form of Inversion of Control (IoC). Instead of a class constructing its collaborators (tight coupling), they are passed in (injected) at construction or method call time.<br><br>
<strong>Why it matters:</strong> You can inject a real database in production and a mock database in tests. You can swap implementations without changing the class that uses them.<br><br>
<strong>DI Containers / Frameworks</strong> (like Spring, .NET's built-in IoC, or Python's dependency-injector) automate wiring dependencies across large codebases.`,
    code: `// Without DI — class creates its own dependency\nclass OrderService:\n    def __init__(self):\n        self.db = PostgresDB()   # hard-coded!\n\n// With DI — dependency is injected\nclass OrderService:\n    def __init__(self, db: Database):\n        self.db = db   # any impl works`,
    tags: ['IoC', 'testability', 'inversion of control', 'mocking'],
    related: ['coupling', 'solid', 'design-patterns']
  },
  {
    id: 'event-driven', cat: 'arch', name: 'Event-Driven Architecture', aka: 'EDA / Message-Driven',
    summary: 'Components communicate by emitting and reacting to events rather than calling each other directly — enabling decoupling and async processing.',
    body: `In EDA, producers emit events (things that happened) onto a bus or queue. Consumers subscribe to events they care about and react independently. Neither side knows about the other.<br><br>
<strong>Key patterns:</strong><br>
• <strong>Pub/Sub</strong>: Publisher emits to a topic; all subscribers receive it (broadcast).<br>
• <strong>Message Queue</strong>: Message sits in a queue until exactly one consumer picks it up (work distribution).<br>
• <strong>Event Sourcing</strong>: The system's state is derived by replaying a log of all events ever emitted — the log is the truth.<br><br>
<strong>Tools:</strong> Kafka, RabbitMQ, AWS SNS/SQS, NATS.`,
    analogy: 'Like an interrupt-driven embedded system — peripherals assert an IRQ (event) without knowing who handles it; the handler reacts asynchronously.',
    tags: ['async', 'pub/sub', 'Kafka', 'message queue', 'decoupling'],
    related: ['microservices', 'cqrs', 'kafka']
  },
  {
    id: 'cqrs', cat: 'arch', name: 'CQRS', aka: 'Command Query Responsibility Segregation',
    summary: 'Separate the read and write paths of a system into distinct models — optimizing each independently.',
    body: `CQRS says that operations that <em>change state</em> (Commands) and operations that <em>read state</em> (Queries) should be handled by different models, potentially different services, and even different databases.<br><br>
<strong>Write side (Commands):</strong> Validated, enforces business rules, writes to a normalized DB or event log.<br>
<strong>Read side (Queries):</strong> Serves denormalized, pre-computed views optimized for the query patterns of the UI.<br><br>
Often paired with <strong>Event Sourcing</strong>: commands produce events; read-side projections are built from those events.<br><br>
<strong>Tradeoff:</strong> Complexity — eventual consistency between write and read sides must be managed.`,
    tags: ['event sourcing', 'read/write separation', 'scalability'],
    related: ['event-driven', 'microservices']
  },

  // ── DATA STRUCTURES & ALGORITHMS ──────────────────────────────────────────
  {
    id: 'big-o', cat: 'dsa', name: 'Big-O Notation', aka: 'Asymptotic Complexity',
    summary: 'A mathematical notation describing how an algorithm\'s time or space requirements grow as input size grows.',
    body: `Big-O describes the <em>worst-case growth rate</em> of an algorithm, ignoring constants and lower-order terms.<br><br>
<strong>Common complexities (best → worst):</strong><br>
O(1) — Constant: array index access<br>
O(log n) — Logarithmic: binary search<br>
O(n) — Linear: linear scan<br>
O(n log n) — Linearithmic: merge sort, heap sort<br>
O(n²) — Quadratic: nested loops, bubble sort<br>
O(2ⁿ) — Exponential: brute-force combinatorics<br><br>
When engineers say "this is O(n²), it won't scale" — they mean the algorithm becomes unusably slow as data grows.`,
    analogy: 'Like interrupt latency analysis: O(1) is a fixed-latency ISR; O(n) is looping through all devices to poll; O(n²) is checking every device pair.',
    tags: ['complexity', 'time complexity', 'space complexity', 'performance'],
    related: ['sorting', 'hash-map', 'binary-search-tree']
  },
  {
    id: 'hash-map', cat: 'dsa', name: 'Hash Map / Hash Table', aka: 'Dictionary, Map, Associative Array',
    summary: 'A data structure that maps keys to values using a hash function for O(1) average-case lookup, insert, and delete.',
    body: `A hash map applies a hash function to a key to compute an index into an underlying array where the value is stored. This gives O(1) average performance for get/set/delete.<br><br>
<strong>Collision:</strong> Two keys hash to the same index. Resolved via chaining (linked list at each bucket) or open addressing (probe for next free slot).<br><br>
<strong>Load factor:</strong> Ratio of entries to buckets. When too high, the table rehashes (resizes) — amortized O(1) overall.<br><br>
In Python: <code>dict</code>. In C++: <code>unordered_map</code>. In Java: <code>HashMap</code>. In Rust: <code>HashMap</code>.`,
    code: `# O(1) lookup\nstore = {}\nstore["session_id"] = "abc123"\nvalue = store["session_id"]  # instant`,
    tags: ['O(1)', 'key-value', 'collision', 'hashing'],
    related: ['big-o', 'binary-search-tree']
  },
  {
    id: 'binary-search-tree', cat: 'dsa', name: 'Trees & Graphs', aka: 'BST, Trie, DAG',
    summary: 'Hierarchical and relational data structures fundamental to search, routing, parsing, and dependency resolution.',
    body: `<strong>Binary Search Tree (BST):</strong> Each node has left (smaller) and right (larger) children. O(log n) search when balanced. Used for sorted sets, range queries.<br><br>
<strong>Balanced BST variants:</strong> AVL tree, Red-Black tree — self-balance to guarantee O(log n). Used in most language stdlib sorted maps.<br><br>
<strong>Trie (prefix tree):</strong> Each edge is a character. Used for autocomplete, IP routing tables.<br><br>
<strong>Graph:</strong> Nodes + edges. Directed (edges have direction) or undirected. Acyclic (DAG) or cyclic.<br>
• <strong>BFS</strong> (Breadth-First Search): shortest path in unweighted graph.<br>
• <strong>DFS</strong> (Depth-First Search): cycle detection, topological sort, connected components.<br>
• <strong>Dijkstra's:</strong> shortest path in weighted graph.`,
    tags: ['BST', 'graph', 'BFS', 'DFS', 'trie', 'DAG'],
    related: ['big-o', 'sorting']
  },
  {
    id: 'sorting', cat: 'dsa', name: 'Sorting Algorithms', aka: 'Merge Sort, Quick Sort, Heap Sort',
    summary: 'Algorithms that reorder collections — each with different time/space tradeoffs and stability properties.',
    body: `<strong>Merge Sort:</strong> Divide-and-conquer. Always O(n log n). Stable (equal elements keep order). Requires O(n) extra space. Preferred when stability matters.<br><br>
<strong>Quick Sort:</strong> Pick a pivot, partition. Average O(n log n), worst O(n²). In-place. Fastest in practice on cache-friendly data.<br><br>
<strong>Heap Sort:</strong> O(n log n) guaranteed. In-place. Not stable. Rarely fastest but predictable.<br><br>
<strong>Counting/Radix Sort:</strong> O(n) — non-comparison sorts when keys are integers in a bounded range.<br><br>
Most language stdlib sorts (Timsort in Python/Java) are hybrid algorithms optimized for real-world data patterns.`,
    tags: ['merge sort', 'quicksort', 'O(n log n)', 'stable sort'],
    related: ['big-o', 'hash-map']
  },
  {
    id: 'dynamic-programming', cat: 'dsa', name: 'Dynamic Programming', aka: 'DP / Memoization',
    summary: 'Breaking a problem into overlapping subproblems and caching their solutions to avoid redundant computation.',
    body: `DP applies when a problem has two properties:<br>

    summary: 'Transforming data to protect it from unauthorized access — using symmetric or asymmetric cryptographic algorithms.',
    body: `<strong>Symmetric encryption:</strong> Same key encrypts and decrypts. Fast. Problem: secure key exchange. Examples: AES-256-GCM.<br><br>
<strong>Asymmetric encryption:</strong> Public key encrypts; private key decrypts. Solves key exchange. Slow — only used for small payloads or to exchange a symmetric key. Examples: RSA, ECDSA, Ed25519.<br><br>

    body: `<strong>The problem:</strong> I/O operations (network, disk) are slow. Blocking a thread while waiting wastes resources. But callbacks ("callback hell") make async code unreadable.<br><br>

    body: `<strong>HTTP/1.1:</strong> Text-based. One request per TCP connection (or pipelining, which is broken in practice). Keep-alive reuses connections but head-of-line blocking limits throughput. Still the majority of the web.<br><br>
<strong>HTTP/2:</strong> Binary framing. Multiplexing — multiple requests over one TCP connection simultaneously. Header compression (HPACK). Server push. Eliminates HTTP/1.1's head-of-line blocking at the HTTP layer (but TCP still has it).<br><br>
<strong>HTTP/3 / QUIC:</strong> Runs over UDP instead of TCP. QUIC builds its own reliable delivery with streams — each stream is independent, so a lost packet only blocks that stream, not all streams (truly solves head-of-line blocking). Built-in TLS 1.3. Faster connection establishment (0-RTT). Used by all major services (Google, Cloudflare).<br><br>
<strong>TLS Handshake:</strong> 1-RTT for TLS 1.3 (down from 2-RTT in TLS 1.2). The handshake negotiates cipher suites, exchanges certificates, and establishes session keys before any HTTP data flows.<br><br>
<strong>DNS resolution flow:</strong> Browser → OS cache → recursive resolver → root NS → TLD NS → authoritative NS → IP.`,

    id: 'cors-cookies', cat: 'web', name: 'CORS & Cookies', aka: 'Same-Origin Policy, SameSite, CSRF',
    summary: 'Browser security mechanisms that control which origins can access which resources — and how credentials are handled.',
    body: `<strong>Same-Origin Policy:</strong> Browsers restrict scripts from making requests to a different origin (scheme + host + port). Prevents malicious pages from reading your bank's API using your cookies.<br><br>
<strong>CORS (Cross-Origin Resource Sharing):</strong> A server opt-in mechanism to allow specific cross-origin requests. The server responds with headers like <code>Access-Control-Allow-Origin: https://app.example.com</code>. Preflight OPTIONS requests verify permission before complex requests.<br><br>
<strong>Cookies:</strong> Small key-value pairs set by the server, stored by the browser, and sent automatically with every request to that domain. Used for sessions and auth.<br><br>
<strong>Cookie flags:</strong><br>
• <code>HttpOnly</code>: JavaScript can't access the cookie. Prevents XSS stealing session tokens.<br>
• <code>Secure</code>: Only sent over HTTPS.<br>
• <code>SameSite=Strict/Lax</code>: Controls whether cookies are sent on cross-site requests. Primary CSRF defense.<br><br>
<strong>JWT vs Session cookies:</strong> Session cookie stores an opaque ID; server looks up session state. JWT is self-contained — server is stateless. JWTs can't be easily invalidated before expiry.`,
    tags: ['CORS', 'SameSite', 'HttpOnly', 'cookie', 'same-origin', 'preflight', 'CSRF', 'JWT'],
    related: ['auth', 'owasp', 'http-internals', 'security-concepts']
  },

  // ── NEW: DATABASE ADDITIONS ────────────────────────────────────────────────
  {
    id: 'database-migrations', cat: 'db', name: 'Schema Migrations', aka: 'Database Migrations, Flyway, Alembic',
    summary: 'Version-controlling database schema changes so they can be applied, tracked, and rolled back like code.',
    body: `Application code and database schema must stay in sync. Schema migrations are versioned scripts that evolve the schema incrementally.<br><br>
<strong>Migration tools:</strong> Flyway (Java), Alembic (Python/SQLAlchemy), Liquibase, Rails ActiveRecord Migrations, Prisma Migrate. Each tracks which migrations have been applied in a metadata table.<br><br>
<strong>Up / Down migrations:</strong> Each migration has an "up" (apply) and optionally a "down" (rollback) script.<br><br>
<strong>Zero-downtime migrations:</strong> The hard part. Adding a nullable column is safe. Renaming or deleting a column requires a multi-step process:<br>
1. Add the new column (backward compatible)<br>
2. Deploy code that writes to both old and new<br>
3. Backfill old data<br>
4. Deploy code reading from new column only<br>
5. Drop the old column<br><br>
<strong>Expand/Contract pattern:</strong> Formalization of the above. Never a breaking schema change in a single deploy.`,
    code: `-- Flyway migration: V3__add_email_index.sql\nCREATE INDEX CONCURRENTLY idx_users_email\n  ON users(email);\n-- CONCURRENTLY = built without locking the table`,
    tags: ['Flyway', 'Alembic', 'migration', 'schema', 'rollback', 'expand-contract', 'zero-downtime'],
    related: ['acid', 'orm', 'ci-cd', 'sql-vs-nosql']
  },
  {
    id: 'search', cat: 'db', name: 'Search & Full-Text Search', aka: 'Elasticsearch, Inverted Index, Vector Search',
    summary: 'Specialized data stores and indexing structures optimized for text search and similarity queries — beyond what SQL can do.',
    body: `<strong>Inverted Index:</strong> The core data structure behind full-text search. Maps each word to the list of documents containing it. Fast lookup: "find all docs containing 'async'" = O(1) lookup in the index.<br><br>
<strong>Elasticsearch / OpenSearch:</strong> Distributed search engine built on Apache Lucene. Supports full-text search, faceting, aggregations, fuzzy matching, geospatial queries. Often used alongside a primary DB ("dual write" pattern).<br><br>
<strong>Relevance scoring:</strong> TF-IDF (term frequency-inverse document frequency) and BM25 rank results by relevance — not just presence.<br><br>
<strong>Vector Search (Embeddings):</strong> Represent documents/images as dense vectors (embeddings from ML models). Similarity search finds nearest neighbors in vector space. Powers semantic search, recommendation systems, RAG (Retrieval-Augmented Generation). Tools: pgvector, Pinecone, Weaviate, Qdrant.<br><br>
<strong>PostgreSQL full-text:</strong> Built-in tsvector/tsquery for basic full-text search without a separate system.`,
    tags: ['Elasticsearch', 'inverted index', 'BM25', 'TF-IDF', 'vector search', 'embeddings', 'RAG', 'pgvector'],
    related: ['sql-vs-nosql', 'indexing', 'caching']
  },
];

// ── STATE ──────────────────────────────────────────────────────────────────
let currentCat = 'all';
let currentTerm = null;
let searchQuery = '';

// ── RENDER TABS ────────────────────────────────────────────────────────────
function renderTabs() {
  const tabsEl = document.getElementById('tabs');
  tabsEl.innerHTML = CATS.map(c => `
    <div class="tab ${c.id === currentCat ? 'active' : ''}" data-cat="${c.id}"
         style="${c.id === currentCat ? `border-bottom-color: ${c.color}; color: ${c.color}` : ''}">
      ${c.id !== 'all' ? `<span class="tab-dot" style="background:${c.color}"></span>` : ''}
      ${c.label}
    </div>
  `).join('');
  tabsEl.querySelectorAll('.tab').forEach(t => {
    t.onclick = () => { currentCat = t.dataset.cat; renderTabs(); renderList(); };
  });
}

// ── FILTER TERMS ───────────────────────────────────────────────────────────
function filteredTerms() {
  return TERMS.filter(t => {
    const catMatch = currentCat === 'all' || t.cat === currentCat;
    if (!catMatch) return false;
    if (!searchQuery) return true;
    const q = searchQuery.toLowerCase();
    return t.name.toLowerCase().includes(q)
      || t.aka.toLowerCase().includes(q)
      || t.summary.toLowerCase().includes(q)
      || (t.tags || []).some(tag => tag.toLowerCase().includes(q));
  });
}

function highlight(text) {
  if (!searchQuery) return text;
  const re = new RegExp(`(${searchQuery.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
  return text.replace(re, '<mark>$1</mark>');
}

// ── RENDER LIST ────────────────────────────────────────────────────────────
function renderList() {
  const list = document.getElementById('term-list');
  const terms = filteredTerms();
  document.getElementById('result-count').textContent = `${terms.length} term${terms.length !== 1 ? 's' : ''}`;

  if (!terms.length) {
    list.innerHTML = `<div class="no-results">No results for "${searchQuery}"</div>`;
    return;
  }

  list.innerHTML = terms.map(t => {
    const cat = CATS.find(c => c.id === t.cat);
    return `
      <div class="term-item ${currentTerm?.id === t.id ? 'active' : ''}" data-id="${t.id}">
        <span class="term-cat-dot ${`bg-${t.cat}`}"></span>
        <div>
          <div class="term-name">${highlight(t.name)}</div>
          <div class="term-preview">${highlight(t.summary)}</div>
        </div>
      </div>
    `;
  }).join('');

  list.querySelectorAll('.term-item').forEach(el => {
    el.onclick = () => {
      const term = TERMS.find(t => t.id === el.dataset.id);
      currentTerm = term;
      renderList();
      renderDetail(term);
    };
  });
}

// ── RENDER DETAIL ──────────────────────────────────────────────────────────
function renderDetail(term) {
  const detail = document.getElementById('detail');
  const cat = CATS.find(c => c.id === term.cat);
  const relatedTerms = (term.related || []).map(id => TERMS.find(t => t.id === id)).filter(Boolean);

  detail.innerHTML = `
    <div class="detail-cat c-${term.cat}">
      <span class="term-cat-dot bg-${term.cat}" style="display:inline-block;width:8px;height:8px;border-radius:50%;"></span>
      ${cat.label}
    </div>
    <div class="detail-title">${term.name}</div>
    ${term.aka ? `<div class="detail-aka">Also: ${term.aka}</div>` : ''}
    <div class="detail-body">${term.body}</div>

    ${term.analogy ? `
      <div class="detail-section">
        <div class="detail-section-title">Analogy</div>
        <div class="analogy-block">
          <span class="label">// mental model</span>
          ${term.analogy}
        </div>
      </div>
    ` : ''}

    ${term.code ? `
      <div class="detail-section">
        <div class="detail-section-title">Example</div>
        <div class="code-block">${term.code}</div>
      </div>
    ` : ''}

    ${term.tags?.length ? `
      <div class="detail-section">
        <div class="detail-section-title">Keywords</div>
        <div class="tag-list">
          ${term.tags.map(tag => `<span class="tag" data-search="${tag}">${tag}</span>`).join('')}
        </div>
      </div>
    ` : ''}

    ${relatedTerms.length ? `
      <div class="detail-section">
        <div class="detail-section-title">Related Concepts</div>
        <div class="tag-list">
          ${relatedTerms.map(rt => `
            <span class="tag" style="border-color:rgba(74,240,160,0.2);color:var(--accent)" data-related="${rt.id}">→ ${rt.name}</span>
          `).join('')}
        </div>
      </div>
    ` : ''}
  `;

  // Tag click → search
  detail.querySelectorAll('.tag[data-search]').forEach(el => {
    el.onclick = () => {
      document.getElementById('search').value = el.dataset.search;
      searchQuery = el.dataset.search;
      currentCat = 'all';
      renderTabs();
      renderList();
    };
  });

  // Related click → navigate
  detail.querySelectorAll('.tag[data-related]').forEach(el => {
    el.onclick = () => {
      const term = TERMS.find(t => t.id === el.dataset.related);
      if (term) {
        currentTerm = term;
        currentCat = 'all';
        searchQuery = '';
        document.getElementById('search').value = '';
        renderTabs();
        renderList();
        renderDetail(term);
      }
    };
  });
}

// ── RANDOM ─────────────────────────────────────────────────────────────────
function pickRandom() {
  const term = TERMS[Math.floor(Math.random() * TERMS.length)];
  currentTerm = term;
  currentCat = 'all';
  searchQuery = '';
  document.getElementById('search').value = '';
  renderTabs();
  renderList();
  renderDetail(term);
  document.querySelector('.term-item.active')?.scrollIntoView({ block: 'nearest' });
}

// ── SEARCH ─────────────────────────────────────────────────────────────────
document.getElementById('search').addEventListener('input', e => {
  searchQuery = e.target.value.trim();
  renderList();
});

// ── INIT ───────────────────────────────────────────────────────────────────
renderTabs();
renderList();

// Select first term
if (TERMS.length) {
  currentTerm = TERMS[0];
  renderList();
  renderDetail(TERMS[0]);
}
</script>
