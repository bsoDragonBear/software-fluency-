    summary: 'Partition resources so that a failure in one part of the system cannot exhaust resources and bring down the whole system.',
    body: `Named after the watertight compartments in a ship\'s hull — a breach in one compartment floods only that compartment, not the entire ship.<br><br>
<strong>The problem without bulkheads:</strong> Your service calls three downstream services — A, B, and C — all using the same shared thread pool. Service A starts hanging (slow responses). Requests queue up, all threads get consumed waiting for A. Now B and C are also unavailable — even though they're healthy. One slow dependency kills everything.<br><br>
<strong>Bulkhead implementations:</strong><br><br>
<strong>Thread pool isolation:</strong> Each downstream dependency gets its own bounded thread pool. A's thread pool fills up → A calls get rejected. B and C's thread pools are unaffected and continue serving requests.<br><br>
<strong>Semaphore isolation:</strong> Limit concurrent calls per dependency with a semaphore. Lighter weight than thread pools, but if calls block on I/O, threads still accumulate.<br><br>
<strong>Process / container isolation:</strong> Run different service responsibilities in separate processes or containers — an infrastructure-level bulkhead. K8s resource limits (CPU/memory) per container are a form of bulkhead.<br><br>
<strong>Combining with Circuit Breaker:</strong> Bulkhead and circuit breaker are complementary. Bulkhead limits blast radius immediately. Circuit breaker detects failure patterns and stops calling the failing service. Most resilience libraries (Resilience4j, Polly, Hystrix) support both.`,

<strong>Choreography — "everyone knows the dance":</strong><br>
Services react to events without being told to. OrderService publishes <code>OrderPlaced</code>. PaymentService listens, charges the card, publishes <code>PaymentProcessed</code>. InventoryService listens, reserves stock, publishes <code>InventoryReserved</code>. No central brain.<br>

✅ Easy to add new participants (subscribe to existing events)<br>

// ── STATE ──────────────────────────────────────────────────────────────────
let currentCat = 'all';
let currentTerm = null;
let searchQuery = '';
let knownTerms  = new Set(JSON.parse(localStorage.getItem('sf-known') || '[]'));
let hideKnown   = false;

// ── KNOWN TERMS ─────────────────────────────────────────────────────────────
function toggleKnown(id) {
  if (knownTerms.has(id)) knownTerms.delete(id);
  else knownTerms.add(id);
  localStorage.setItem('sf-known', JSON.stringify([...knownTerms]));
  renderProgress();
  renderList();
  if (currentTerm) renderDetail(currentTerm);
}

function toggleHideKnown() {
  hideKnown = !hideKnown;
  const btn = document.getElementById('hide-known-btn');
  btn.classList.toggle('active', hideKnown);
  btn.textContent = hideKnown ? '● Hide known' : '○ Hide known';
  renderList();
}

function renderProgress() {
  const total = TERMS.length;
  const known = knownTerms.size;
  document.getElementById('progress-fill').style.width = total ? (known / total * 100) + '%' : '0%';
  document.getElementById('progress-label').textContent = `${known} / ${total} known`;
}

// ── RENDER TABS ────────────────────────────────────────────────────────────
function renderTabs() {
  const tabsEl = document.getElementById('tabs');
  tabsEl.innerHTML = CATS.map(c => `
    <div class="tab ${c.id === currentCat ? 'active' : ''}" data-cat="${c.id}"
         style="${c.id === currentCat ? `border-bottom-color: ${c.color}; color: ${c.color}` : ''}">
      ${c.id !== 'all' ? `<span class="tab-dot" style="background:${c.color}"></span>` : ''}
      ${c.label}
    </div>
  `).join('');
  tabsEl.querySelectorAll('.tab').forEach(t => {
    t.onclick = () => { currentCat = t.dataset.cat; renderTabs(); renderList(); };
  });
}

// ── FILTER TERMS ───────────────────────────────────────────────────────────
function filteredTerms() {
  return TERMS.filter(t => {
    if (hideKnown && knownTerms.has(t.id)) return false;
    const catMatch = currentCat === 'all' || t.cat === currentCat;
    if (!catMatch) return false;
    if (!searchQuery) return true;
    const q = searchQuery.toLowerCase();
    return t.name.toLowerCase().includes(q)
      || t.aka.toLowerCase().includes(q)
      || t.summary.toLowerCase().includes(q)
      || (t.tags || []).some(tag => tag.toLowerCase().includes(q));
  });
}

function highlight(text) {
  if (!searchQuery) return text;
  const re = new RegExp(`(${searchQuery.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
  return text.replace(re, '<mark>$1</mark>');
}

// ── RENDER LIST ────────────────────────────────────────────────────────────
function renderList() {
  const list = document.getElementById('term-list');
  const terms = filteredTerms();
  document.getElementById('result-count').textContent = `${terms.length} term${terms.length !== 1 ? 's' : ''}`;

  if (!terms.length) {
    list.innerHTML = `<div class="no-results">No results for "${searchQuery}"</div>`;
    return;
  }

  list.innerHTML = terms.map(t => {
    const known = knownTerms.has(t.id);
    return `
      <div class="term-item ${currentTerm?.id === t.id ? 'active' : ''} ${known ? 'known' : ''}" data-id="${t.id}">
        <span class="term-cat-dot ${`bg-${t.cat}`}"></span>
        <div style="flex:1;min-width:0">
          <div class="term-name">${highlight(t.name)}</div>
          <div class="term-preview">${highlight(t.summary)}</div>
        </div>
        ${known ? '<span class="term-known-check">✓</span>' : ''}
      </div>
    `;
  }).join('');

  list.querySelectorAll('.term-item').forEach(el => {
    el.onclick = () => {
      const term = TERMS.find(t => t.id === el.dataset.id);
      currentTerm = term;
      renderList();
      renderDetail(term);
    };
  });
}

// ── RENDER DETAIL ──────────────────────────────────────────────────────────
function renderDetail(term) {
  const detail = document.getElementById('detail');
  const cat = CATS.find(c => c.id === term.cat);
  const relatedTerms = (term.related || []).map(id => TERMS.find(t => t.id === id)).filter(Boolean);

  detail.innerHTML = `
    <div class="detail-cat c-${term.cat}">
      <span class="term-cat-dot bg-${term.cat}" style="display:inline-block;width:8px;height:8px;border-radius:50%;"></span>
      ${cat.label}
    </div>
    <div class="detail-title">${term.name}</div>
    ${term.aka ? `<div class="detail-aka">Also: ${term.aka}</div>` : ''}
    <button class="known-toggle ${knownTerms.has(term.id) ? 'is-known' : ''}" data-id="${term.id}">
      ${knownTerms.has(term.id) ? '✓ I know this' : '○ Mark as known'}
    </button>
    <div class="detail-body">${term.body}</div>

    ${term.analogy ? `
      <div class="detail-section">
        <div class="detail-section-title">Analogy</div>
        <div class="analogy-block">
          <span class="label">// mental model</span>
          ${term.analogy}
        </div>
      </div>
    ` : ''}

    ${term.code ? `
      <div class="detail-section">
        <div class="detail-section-title">Example</div>
        <div class="code-block">${term.code}</div>
      </div>
    ` : ''}

    ${term.tags?.length ? `
      <div class="detail-section">
        <div class="detail-section-title">Keywords</div>
        <div class="tag-list">
          ${term.tags.map(tag => `<span class="tag" data-search="${tag}">${tag}</span>`).join('')}
        </div>
      </div>
    ` : ''}

    ${relatedTerms.length ? `
      <div class="detail-section">
        <div class="detail-section-title">Related Concepts</div>
        <div class="tag-list">
          ${relatedTerms.map(rt => `
            <span class="tag" style="border-color:rgba(74,240,160,0.2);color:var(--accent)" data-related="${rt.id}">→ ${rt.name}</span>
          `).join('')}
        </div>
      </div>
    ` : ''}
  `;

  // Known toggle
  detail.querySelector('.known-toggle').onclick = () => toggleKnown(term.id);

  // Tag click → search
  detail.querySelectorAll('.tag[data-search]').forEach(el => {
    el.onclick = () => {
      document.getElementById('search').value = el.dataset.search;
      searchQuery = el.dataset.search;
      currentCat = 'all';
      renderTabs();
      renderList();
    };
  });

  // Related click → navigate
  detail.querySelectorAll('.tag[data-related]').forEach(el => {
    el.onclick = () => {
      const term = TERMS.find(t => t.id === el.dataset.related);
      if (term) {
        currentTerm = term;
        currentCat = 'all';
        searchQuery = '';
        document.getElementById('search').value = '';
        renderTabs();
        renderList();
        renderDetail(term);
      }
    };
  });
}

// ── RANDOM ─────────────────────────────────────────────────────────────────
function pickRandom() {
  const pool = TERMS.filter(t => !knownTerms.has(t.id));
  if (!pool.length) return;
  const term = pool[Math.floor(Math.random() * pool.length)];
  currentTerm = term;
  currentCat = 'all';
  searchQuery = '';
  document.getElementById('search').value = '';
  renderTabs();
  renderList();
  renderDetail(term);
  document.querySelector('.term-item.active')?.scrollIntoView({ block: 'nearest' });
}

// ── SEARCH ─────────────────────────────────────────────────────────────────
document.getElementById('search').addEventListener('input', e => {
  searchQuery = e.target.value.trim();
  renderList();
});

// ── INIT ───────────────────────────────────────────────────────────────────
renderTabs();
renderList();
renderProgress();

// Select first term
if (TERMS.length) {
  currentTerm = TERMS[0];
  renderList();
  renderDetail(TERMS[0]);
}
</script>
</body>
