<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Software Fluency — Reference</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0f12;
    --surface: #141720;
    --surface2: #1c2030;
    --border: #252a38;
    --accent: #4af0a0;
    --accent2: #3db8ff;
    --accent3: #ff6b6b;
    --accent4: #ffd166;
    --text: #e2e8f0;
    --text-dim: #7a8499;
    --text-faint: #3d4459;
    --mono: 'IBM Plex Mono', monospace;
    --sans: 'IBM Plex Sans', sans-serif;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* HEADER */
  header {
    padding: 28px 32px 0;
    border-bottom: 1px solid var(--border);
  }

  .header-top {
    display: flex;
    align-items: baseline;
    gap: 14px;
    margin-bottom: 20px;
  }

  .logo {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--accent);
    letter-spacing: 0.18em;
    text-transform: uppercase;
    opacity: 0.8;
  }

  h1 {
    font-size: 22px;
    font-weight: 300;
    letter-spacing: -0.02em;
    color: var(--text);
  }

  h1 span { color: var(--accent); font-weight: 600; }

  /* SEARCH */
  .search-bar {
    position: relative;
    margin-bottom: 0;
  }

  .search-bar input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-bottom: none;
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    padding: 11px 14px 11px 38px;
    outline: none;
    border-radius: 6px 6px 0 0;
    transition: border-color 0.2s;
  }

  .search-bar input:focus { border-color: var(--accent); }
  .search-bar input::placeholder { color: var(--text-faint); }

  .search-icon {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-faint);
    font-size: 14px;
  }

  #result-count {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-faint);
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
  }

  /* TABS */
  .tabs {
    display: flex;
    gap: 0;
    overflow-x: auto;
    scrollbar-width: none;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 0;
  }

  .tabs::-webkit-scrollbar { display: none; }

  .tab {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-faint);
    padding: 10px 16px;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    white-space: nowrap;
    transition: all 0.15s;
    flex-shrink: 0;
  }

  .tab:hover { color: var(--text-dim); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  .tab-dot {
    display: inline-block;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    margin-right: 6px;
    vertical-align: middle;
    position: relative;
    top: -1px;
  }

  /* MAIN LAYOUT */
  .main {
    display: flex;
    flex: 1;
    overflow: hidden;
    height: calc(100vh - 160px);
  }

  /* TERM LIST */
  .term-list {
    width: 280px;
    flex-shrink: 0;
    overflow-y: auto;
    border-right: 1px solid var(--border);
    background: var(--surface);
  }

  .term-list::-webkit-scrollbar { width: 4px; }
  .term-list::-webkit-scrollbar-track { background: transparent; }
  .term-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .term-item {
    padding: 12px 16px;
    cursor: pointer;
    border-bottom: 1px solid var(--border);
    transition: background 0.1s;
    display: flex;
    align-items: flex-start;
    gap: 10px;
  }

  .term-item:hover { background: var(--surface2); }
  .term-item.active { background: var(--surface2); border-left: 2px solid var(--accent); padding-left: 14px; }

  .term-cat-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    flex-shrink: 0;
    margin-top: 5px;
  }

  .term-name {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text);
    line-height: 1.4;
  }

  .term-item.active .term-name { color: var(--accent); }

  .term-preview {
    font-size: 11px;
    color: var(--text-faint);
    margin-top: 2px;
    line-height: 1.4;
    overflow: hidden;
    display: -webkit-box;
    -webkit-line-clamp: 1;
    -webkit-box-orient: vertical;
  }

  /* DETAIL PANEL */
  .detail {
    flex: 1;
    overflow-y: auto;
    padding: 32px 40px;
  }

  .detail::-webkit-scrollbar { width: 4px; }
  .detail::-webkit-scrollbar-track { background: transparent; }
  .detail::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .detail-empty {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: var(--text-faint);
    text-align: center;
  }

  .detail-empty .big { font-size: 48px; margin-bottom: 16px; }
  .detail-empty p { font-size: 13px; font-family: var(--mono); }

  .detail-cat {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .detail-title {
    font-size: 28px;
    font-weight: 600;
    letter-spacing: -0.03em;
    margin-bottom: 6px;
    color: var(--text);
  }

  .detail-aka {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-faint);
    margin-bottom: 24px;
  }

  .detail-body {
    font-size: 14px;
    line-height: 1.75;
    color: var(--text-dim);
    max-width: 680px;
    margin-bottom: 28px;
  }

  .detail-body strong { color: var(--text); font-weight: 500; }

  .detail-section {
    margin-bottom: 24px;
    max-width: 680px;
  }

  .detail-section-title {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-faint);
    margin-bottom: 10px;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--border);
  }

  .detail-section p {
    font-size: 13px;
    line-height: 1.7;
    color: var(--text-dim);
  }

  .detail-section p + p { margin-top: 8px; }

  .tag-list { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }

  .tag {
    font-family: var(--mono);
    font-size: 10px;
    padding: 3px 8px;
    border-radius: 3px;
    border: 1px solid var(--border);
    color: var(--text-dim);
    cursor: pointer;
    transition: all 0.15s;
  }

  .tag:hover { border-color: var(--accent2); color: var(--accent2); }

  .code-block {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 14px 16px;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--accent);
    line-height: 1.6;
    margin-top: 10px;
    white-space: pre-wrap;
    word-break: break-word;
  }

  .analogy-block {
    background: linear-gradient(135deg, rgba(74,240,160,0.04), rgba(61,184,255,0.04));
    border: 1px solid rgba(74,240,160,0.15);
    border-radius: 6px;
    padding: 14px 16px;
    font-size: 13px;
    color: var(--text-dim);
    line-height: 1.65;
    margin-top: 10px;
  }

  .analogy-block .label {
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 0.14em;
    color: var(--accent);
    margin-bottom: 6px;
    display: block;
  }

  /* EMPTY SEARCH */
  .no-results {
    padding: 24px 16px;
    text-align: center;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-faint);
  }

  /* CATEGORY COLORS */
  .c-arch { color: #4af0a0; }
  .c-dsa { color: #3db8ff; }
  .c-dist { color: #ff6b6b; }
  .c-devops { color: #ffd166; }
  .c-db { color: #c084fc; }
  .c-web { color: #fb923c; }
  .c-sec { color: #f472b6; }
  .c-lang { color: #a3e635; }

  .bg-arch { background: #4af0a0; }
  .bg-dsa { background: #3db8ff; }
  .bg-dist { background: #ff6b6b; }
  .bg-devops { background: #ffd166; }
  .bg-db { background: #c084fc; }
  .bg-web { background: #fb923c; }
  .bg-sec { background: #f472b6; }
  .bg-lang { background: #a3e635; }
  .c-embed { color: #06b6d4; }
  .bg-embed { background: #06b6d4; }
  .c-fpga { color: #f59e0b; }
  .bg-fpga { background: #f59e0b; }

  mark {
    background: rgba(74,240,160,0.25);
    color: var(--accent);
    border-radius: 2px;
    padding: 0 1px;
  }

  #random-btn {
    margin-left: auto;
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 6px 14px;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.15s;
    align-self: center;
  }

  #random-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  /* PROGRESS BAR */
  .progress-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 14px;
  }

  .progress-track {
    flex: 1;
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    transition: width 0.35s ease;
    width: 0%;
  }

  .progress-label {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-faint);
    white-space: nowrap;
  }

  /* HIDE KNOWN BUTTON */
  #hide-known-btn {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 6px 14px;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.15s;
    align-self: center;
  }

  #hide-known-btn.active {
    border-color: var(--accent4);
    color: var(--accent4);
  }

  /* KNOWN INDICATOR IN LIST */
  .term-item.known .term-name  { color: var(--text-faint); }
  .term-item.known .term-preview { opacity: 0.5; }

  .term-known-check {
    margin-left: auto;
    color: var(--accent);
    font-size: 11px;
    flex-shrink: 0;
    padding-left: 6px;
  }

  /* KNOWN TOGGLE IN DETAIL */
  .known-toggle {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.06em;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 5px 12px;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.15s;
    margin-bottom: 24px;
  }

  .known-toggle:hover { border-color: var(--accent); color: var(--accent); }

  .known-toggle.is-known {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(74,240,160,0.08);
  }
</style>
</head>
<body>

<header>
  <div class="header-top">
    <span class="logo">// ref</span>
    <h1>Software <span>Fluency</span></h1>
    <button id="random-btn" onclick="pickRandom()">⚄ Random</button>
    <button id="hide-known-btn" onclick="toggleHideKnown()">○ Hide known</button>
  </div>
  <div class="progress-row">
    <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>
    <span class="progress-label" id="progress-label"></span>
  </div>
  <div class="search-bar">
    <span class="search-icon">⌕</span>
    <input type="text" id="search" placeholder="Search terms, concepts, patterns..." autocomplete="off" spellcheck="false">
    <span id="result-count"></span>
  </div>
  <div class="tabs" id="tabs"></div>
</header>

<div class="main">
  <div class="term-list" id="term-list"></div>
  <div class="detail" id="detail">
    <div class="detail-empty">
      <div class="big">⌨</div>
      <p>Select a term to explore it.</p>
    </div>
  </div>
</div>

<script>
const CATS = [
  { id: 'all',    label: 'All',          color: '#7a8499' },
  { id: 'arch',   label: 'Architecture', color: '#4af0a0' },
  { id: 'dsa',    label: 'Data Structs', color: '#3db8ff' },
  { id: 'dist',   label: 'Distributed',  color: '#ff6b6b' },
  { id: 'devops', label: 'DevOps/CI',    color: '#ffd166' },
  { id: 'db',     label: 'Databases',    color: '#c084fc' },
  { id: 'web',    label: 'Web / API',    color: '#fb923c' },
  { id: 'sec',    label: 'Security',     color: '#f472b6' },
  { id: 'lang',   label: 'Paradigms',    color: '#a3e635' },
  { id: 'embed',  label: 'Embedded',     color: '#06b6d4' },
  { id: 'fpga',   label: 'FPGA / HDL',   color: '#f59e0b' },
];

const TERMS = [
  // ── ARCHITECTURE ──────────────────────────────────────────────────────────
  {
    id: 'solid', cat: 'arch', name: 'SOLID Principles', aka: 'S O L I D',
    summary: 'Five foundational object-oriented design principles that produce maintainable, extensible code.',
    body: `<strong>SOLID</strong> is an acronym for five design principles that guide how software components should be structured and relate to each other. They are language-agnostic and apply at the class/module level.<br><br>
<strong>S — Single Responsibility:</strong> A class should have one reason to change. Don't mix UI logic with business logic with persistence.<br>
<strong>O — Open/Closed:</strong> Open for extension, closed for modification. Add behavior via new code, not by changing existing code.<br>
<strong>L — Liskov Substitution:</strong> Subtypes must be substitutable for their base types without breaking correctness.<br>
<strong>I — Interface Segregation:</strong> Clients shouldn't depend on interfaces they don't use. Prefer many small interfaces over one fat one.<br>
<strong>D — Dependency Inversion:</strong> Depend on abstractions, not concretions. High-level modules shouldn't import low-level ones directly.`,
    analogy: 'Like circuit board design: each module does one thing (S), you add capability via daughter boards not rewiring the motherboard (O), and you communicate through defined connector standards not direct wire bonds (D).',
    tags: ['OOP', 'design principles', 'modularity', 'coupling'],
    related: ['dependency-injection', 'design-patterns', 'coupling']
  },
  {
    id: 'design-patterns', cat: 'arch', name: 'Design Patterns', aka: 'GoF Patterns',
    summary: 'Reusable solutions to commonly occurring problems in software design — a shared vocabulary for developers.',
    body: `Design patterns are named, documented templates for solving recurring design problems. They come in three families:<br><br>
<strong>Creational</strong> (how objects are created): Factory, Abstract Factory, Singleton, Builder, Prototype.<br>
<strong>Structural</strong> (how objects are composed): Adapter, Bridge, Composite, Decorator, Facade, Proxy.<br>
<strong>Behavioral</strong> (how objects communicate): Observer, Strategy, Command, Iterator, State, Template Method.<br><br>
The value isn't copy-pasting code — it's having a name for a solution so a team can say "let's use an Observer here" and everyone understands immediately.`,
    analogy: 'Like standard schematic symbols — you could draw every transistor from scratch, but using standard symbols lets everyone read the schematic instantly.',
    tags: ['GoF', 'OOP', 'factory', 'observer', 'singleton', 'decorator'],
    related: ['solid', 'coupling', 'dependency-injection']
  },
  {
    id: 'microservices', cat: 'arch', name: 'Microservices', aka: 'Service-Oriented Architecture (SOA)',
    summary: 'An architectural style that structures an application as a collection of small, independently deployable services, each owning its own data.',
    body: `In a microservices architecture, a large application is decomposed into small services that each do one thing. Each service:<br>
• Runs in its own process<br>
• Has its own database (no shared state)<br>
• Communicates over a network (HTTP/REST, gRPC, or message queues)<br>
• Can be deployed, scaled, and updated independently<br><br>
<strong>Contrast with a Monolith</strong> — a single deployable unit where all code runs in one process. Monoliths are simpler early on; microservices pay off at scale.<br><br>
<strong>Tradeoffs:</strong> Microservices add network latency, distributed system complexity, and operational overhead in exchange for independent scaling and fault isolation.`,
    analogy: 'Like a distributed embedded system with multiple MCUs on a CAN bus, each handling a specific subsystem — vs. one giant MCU trying to do everything.',
    tags: ['distributed', 'scalability', 'decomposition', 'API'],
    related: ['api-gateway', 'event-driven', 'docker', 'service-mesh']
  },
  {
    id: 'coupling', cat: 'arch', name: 'Coupling & Cohesion', aka: 'Tight vs. Loose Coupling',
    summary: 'Two key metrics for software quality: coupling measures interdependency between modules; cohesion measures how focused a module is.',
    body: `<strong>Coupling</strong> describes how much one module depends on the internals of another. Low (loose) coupling is desirable — changes in one module don't ripple through the system.<br><br>
<strong>Cohesion</strong> describes how related the responsibilities within a single module are. High cohesion is desirable — a module that does one coherent thing is easier to understand and test.<br><br>
The mantra: <em>low coupling, high cohesion</em>. A module that is tightly coupled to many others and handles unrelated concerns is a maintenance nightmare.`,
    code: `// Tight coupling — UserService knows DB internals\nclass UserService:\n    def get_user(id):\n        return db.execute("SELECT * FROM users WHERE id=?", id)\n\n// Loose coupling — depends on abstraction\nclass UserService:\n    def __init__(self, repo: UserRepository):\n        self.repo = repo\n    def get_user(id):\n        return self.repo.find(id)`,
    tags: ['modularity', 'dependency', 'abstraction'],
    related: ['solid', 'dependency-injection', 'design-patterns']
  },
  {
    id: 'dependency-injection', cat: 'arch', name: 'Dependency Injection', aka: 'DI / IoC',
    summary: 'A pattern where a component receives its dependencies from outside rather than creating them itself — enabling testability and flexibility.',
    body: `Dependency Injection (DI) is a form of Inversion of Control (IoC). Instead of a class constructing its collaborators (tight coupling), they are passed in (injected) at construction or method call time.<br><br>
<strong>Why it matters:</strong> You can inject a real database in production and a mock database in tests. You can swap implementations without changing the class that uses them.<br><br>
<strong>DI Containers / Frameworks</strong> (like Spring, .NET's built-in IoC, or Python's dependency-injector) automate wiring dependencies across large codebases.`,
    code: `// Without DI — class creates its own dependency\nclass OrderService:\n    def __init__(self):\n        self.db = PostgresDB()   # hard-coded!\n\n// With DI — dependency is injected\nclass OrderService:\n    def __init__(self, db: Database):\n        self.db = db   # any impl works`,
    tags: ['IoC', 'testability', 'inversion of control', 'mocking'],
    related: ['coupling', 'solid', 'design-patterns']
  },
  {
    id: 'event-driven', cat: 'arch', name: 'Event-Driven Architecture', aka: 'EDA / Message-Driven',
    summary: 'Components communicate by emitting and reacting to events rather than calling each other directly — enabling decoupling and async processing.',
    body: `In EDA, producers emit events (things that happened) onto a bus or queue. Consumers subscribe to events they care about and react independently. Neither side knows about the other.<br><br>
<strong>Key patterns:</strong><br>
• <strong>Pub/Sub</strong>: Publisher emits to a topic; all subscribers receive it (broadcast).<br>
• <strong>Message Queue</strong>: Message sits in a queue until exactly one consumer picks it up (work distribution).<br>
• <strong>Event Sourcing</strong>: The system's state is derived by replaying a log of all events ever emitted — the log is the truth.<br><br>
<strong>Tools:</strong> Kafka, RabbitMQ, AWS SNS/SQS, NATS.`,
    analogy: 'Like an interrupt-driven embedded system — peripherals assert an IRQ (event) without knowing who handles it; the handler reacts asynchronously.',
    tags: ['async', 'pub/sub', 'Kafka', 'message queue', 'decoupling'],
    related: ['microservices', 'cqrs', 'kafka']
  },
  {
    id: 'cqrs', cat: 'arch', name: 'CQRS', aka: 'Command Query Responsibility Segregation',
    summary: 'Separate the read and write paths of a system into distinct models — optimizing each independently.',
    body: `CQRS says that operations that <em>change state</em> (Commands) and operations that <em>read state</em> (Queries) should be handled by different models, potentially different services, and even different databases.<br><br>
<strong>Write side (Commands):</strong> Validated, enforces business rules, writes to a normalized DB or event log.<br>
<strong>Read side (Queries):</strong> Serves denormalized, pre-computed views optimized for the query patterns of the UI.<br><br>
Often paired with <strong>Event Sourcing</strong>: commands produce events; read-side projections are built from those events.<br><br>
<strong>Tradeoff:</strong> Complexity — eventual consistency between write and read sides must be managed.`,
    tags: ['event sourcing', 'read/write separation', 'scalability'],
    related: ['event-driven', 'microservices']
  },

  // ── DATA STRUCTURES & ALGORITHMS ──────────────────────────────────────────
  {
    id: 'big-o', cat: 'dsa', name: 'Big-O Notation', aka: 'Asymptotic Complexity',
    summary: 'A mathematical notation describing how an algorithm\'s time or space requirements grow as input size grows.',
    body: `Big-O describes the <em>worst-case growth rate</em> of an algorithm, ignoring constants and lower-order terms.<br><br>
<strong>Common complexities (best → worst):</strong><br>
O(1) — Constant: array index access<br>
O(log n) — Logarithmic: binary search<br>
O(n) — Linear: linear scan<br>
O(n log n) — Linearithmic: merge sort, heap sort<br>
O(n²) — Quadratic: nested loops, bubble sort<br>
O(2ⁿ) — Exponential: brute-force combinatorics<br><br>
When engineers say "this is O(n²), it won't scale" — they mean the algorithm becomes unusably slow as data grows.`,
    analogy: 'Like interrupt latency analysis: O(1) is a fixed-latency ISR; O(n) is looping through all devices to poll; O(n²) is checking every device pair.',
    tags: ['complexity', 'time complexity', 'space complexity', 'performance'],
    related: ['sorting', 'hash-map', 'binary-search-tree']
  },
  {
    id: 'hash-map', cat: 'dsa', name: 'Hash Map / Hash Table', aka: 'Dictionary, Map, Associative Array',
    summary: 'A data structure that maps keys to values using a hash function for O(1) average-case lookup, insert, and delete.',

  {
    id: 'async-await', cat: 'lang', name: 'Async / Await & Event Loops', aka: 'Promises, Futures, Coroutines',
    summary: 'A language-level model for writing non-blocking I/O code that reads like synchronous code — without threads.',
    body: `<strong>The problem:</strong> I/O operations (network, disk) are slow. Blocking a thread while waiting wastes resources. But callbacks ("callback hell") make async code unreadable.<br><br>
<strong>Promises/Futures:</strong> A value that doesn't exist yet but will. A Promise (JS) or Future (Rust/Java) represents a pending async result you can chain or await.<br><br>
<strong>Async/Await:</strong> Syntax sugar over Futures. <code>await</code> suspends the current coroutine at that point and returns control to the runtime — without blocking the thread. The runtime resumes it when the result is ready.<br><br>
<strong>Event Loop:</strong> A single-threaded loop that picks up completed I/O events and resumes the coroutines waiting on them. One thread can handle thousands of concurrent connections this way (JavaScript's model, Python asyncio, Rust tokio).<br><br>
<strong>CPU-bound vs I/O-bound:</strong> Async wins for I/O-bound work (waiting on network/disk). For CPU-bound work, you need real threads or a thread pool — async doesn't help if you're burning CPU cycles.<br><br>
<strong>Colored functions problem:</strong> Async is "contagious" — an async function can only be awaited from another async function. Mixing sync and async code requires care (run_in_executor in Python, spawn_blocking in Tokio).`,
    analogy: 'Exactly like interrupt-driven I/O in firmware. Instead of busy-polling a UART, you fire the transfer and yield. The interrupt (event loop) wakes you when data arrives. Async/await is that pattern with nice syntax.',
    code: `# Python asyncio — one thread, many concurrent requests\nasync def fetch(url):\n    async with aiohttp.ClientSession() as s:\n        async with s.get(url) as resp:\n            return await resp.text()  # yields here; doesn't block\n\nasync def main():\n    # Run 100 fetches concurrently on ONE thread\n    results = await asyncio.gather(*[fetch(url) for url in urls])`,
    tags: ['async', 'await', 'Promise', 'Future', 'event loop', 'coroutine', 'tokio', 'asyncio', 'non-blocking'],

    summary: 'The evolution of async composition patterns — from raw callbacks to chainable Promises to awaitable Futures.',
    body: `<strong>Callbacks (1st gen):</strong> Pass a function to be called when the async work finishes. Simple but nests deeply ("pyramid of doom"). Error handling is inconsistent.<br><br>

<strong>Async/Await (3rd gen):</strong> Makes promise chains read as straight-line code. Under the hood it's still Promises — just desugared by the compiler.<br><br>

    body: `A message broker accepts messages from producers and holds them until consumers are ready. Producers and consumers are fully decoupled — neither knows about the other.<br><br>

    summary: 'Safely storing and distributing credentials, API keys, and certificates — never hardcoded in source code.',
    body: `Hardcoded secrets in source code are one of the most common and damaging security mistakes. Once a repo is committed, secrets are in git history forever.<br><br>
<strong>Environment Variables:</strong> Secrets injected at runtime via the environment. Better than hardcoding, but secrets can leak via logs or process inspection.<br><br>

  {
    id: 'http-internals', cat: 'web', name: 'HTTP Internals', aka: 'HTTP/1.1, HTTP/2, HTTP/3, QUIC',
    summary: 'How the web\'s foundational protocol evolved — from a simple text protocol to a multiplexed binary protocol over UDP.',
    body: `<strong>HTTP/1.1:</strong> Text-based. One request per TCP connection (or pipelining, which is broken in practice). Keep-alive reuses connections but head-of-line blocking limits throughput. Still the majority of the web.<br><br>
<strong>HTTP/2:</strong> Binary framing. Multiplexing — multiple requests over one TCP connection simultaneously. Header compression (HPACK). Server push. Eliminates HTTP/1.1's head-of-line blocking at the HTTP layer (but TCP still has it).<br><br>
<strong>HTTP/3 / QUIC:</strong> Runs over UDP instead of TCP. QUIC builds its own reliable delivery with streams — each stream is independent, so a lost packet only blocks that stream, not all streams (truly solves head-of-line blocking). Built-in TLS 1.3. Faster connection establishment (0-RTT). Used by all major services (Google, Cloudflare).<br><br>
<strong>TLS Handshake:</strong> 1-RTT for TLS 1.3 (down from 2-RTT in TLS 1.2). The handshake negotiates cipher suites, exchanges certificates, and establishes session keys before any HTTP data flows.<br><br>
<strong>DNS resolution flow:</strong> Browser → OS cache → recursive resolver → root NS → TLD NS → authoritative NS → IP.`,
    tags: ['HTTP/2', 'HTTP/3', 'QUIC', 'multiplexing', 'TLS', 'head-of-line blocking', 'HPACK'],

    summary: 'Browser security mechanisms that control which origins can access which resources — and how credentials are handled.',
    body: `<strong>Same-Origin Policy:</strong> Browsers restrict scripts from making requests to a different origin (scheme + host + port). Prevents malicious pages from reading your bank's API using your cookies.<br><br>
<strong>CORS (Cross-Origin Resource Sharing):</strong> A server opt-in mechanism to allow specific cross-origin requests. The server responds with headers like <code>Access-Control-Allow-Origin: https://app.example.com</code>. Preflight OPTIONS requests verify permission before complex requests.<br><br>
<strong>Cookies:</strong> Small key-value pairs set by the server, stored by the browser, and sent automatically with every request to that domain. Used for sessions and auth.<br><br>
<strong>Cookie flags:</strong><br>
• <code>HttpOnly</code>: JavaScript can't access the cookie. Prevents XSS stealing session tokens.<br>
• <code>Secure</code>: Only sent over HTTPS.<br>
• <code>SameSite=Strict/Lax</code>: Controls whether cookies are sent on cross-site requests. Primary CSRF defense.<br><br>
<strong>JWT vs Session cookies:</strong> Session cookie stores an opaque ID; server looks up session state. JWT is self-contained — server is stateless. JWTs can't be easily invalidated before expiry.`,

    summary: 'An OS designed to execute tasks within guaranteed time constraints — determinism is the defining feature.',
    body: `An RTOS provides scheduling, synchronization, and communication primitives tuned for <strong>deterministic latency</strong>, not throughput. Unlike desktop OSes, the scheduler's job is to ensure the highest-priority ready task always runs — immediately.<br><br>
<strong>Hard vs Soft Real-Time:</strong> Hard RT systems (airbags, pacemakers) must never miss a deadline. Soft RT systems (audio streaming) degrade gracefully.<br><br>
<strong>Scheduling:</strong> Typically preemptive priority-based. Higher-priority tasks preempt lower ones instantly. Round-robin breaks ties.<br><br>
<strong>Key primitives:</strong> Tasks/threads, semaphores (counting + binary), mutexes (with priority inheritance), queues, event flags, timers.<br><br>
<strong>Priority Inversion:</strong> A high-priority task blocked waiting for a resource held by a low-priority task. Solved via priority inheritance (the mutex temporarily boosts the low-priority holder). Famous failure: Mars Pathfinder.<br><br>
<strong>Common RTOSes:</strong> FreeRTOS (most widely used, open-source), Zephyr (Linux Foundation, modern), ThreadX (Azure RTOS), QNX (safety-critical), VxWorks (aerospace/defense).`,

    body: `Bare-metal firmware owns the processor from reset. There is no OS scheduler, no dynamic allocation safety net, no system calls — just your code, the hardware, and the startup file.<br><br>

    id: 'interrupts', cat: 'embed', name: 'Interrupts & ISRs', aka: 'IRQ, Interrupt Service Routine, NVIC, vectored interrupts',
    summary: 'Hardware signals that asynchronously pause the CPU to handle time-critical events immediately.',
    body: `An interrupt is a hardware signal that causes the CPU to suspend its current execution, save its state, and jump to an <strong>Interrupt Service Routine (ISR)</strong>. When the ISR returns, execution resumes where it left off.<br><br>
<strong>Interrupt vector table:</strong> A fixed memory array mapping each interrupt source to its ISR address. On ARM Cortex-M, it lives at the start of flash (0x00000000).<br><br>
<strong>NVIC (Nested Vectored Interrupt Controller):</strong> ARM's interrupt controller. Supports configurable priorities, nesting (higher-priority ISR can interrupt a lower-priority one), and tail-chaining (back-to-back ISRs without full context restore).<br><br>
<strong>ISR rules:</strong><br>
• Keep ISRs short and fast — they block the system<br>
• Never block in an ISR (no mutexes, no delay loops)<br>
• Use <code>volatile</code> for variables shared between ISR and main code<br>
• Signal the main loop via flags, queues, or semaphores; do the heavy work outside the ISR<br><br>
<strong>Interrupt latency:</strong> The time from interrupt assertion to first ISR instruction. ARM Cortex-M guarantees ≤12 cycles for zero-wait-state flash.`,

    summary: 'Hardware peripheral registers accessed via ordinary memory addresses — the foundation of embedded peripheral control.',
    body: `In most microcontrollers, peripherals (GPIO, UART, SPI, timers) are controlled by <strong>reading and writing specific memory addresses</strong>. These aren't RAM — writes go directly to hardware logic.<br><br>
<strong>Register map:</strong> The datasheet defines the address and bit layout of every register. E.g., the STM32F4 GPIOA output data register is at <code>0x40020014</code>. Bit 5 controls pin PA5.<br><br>
<strong>volatile is mandatory:</strong> The compiler must not optimize away register accesses. Every read/write must reach the bus. Declare all MMIO pointers as <code>volatile</code>.<br><br>
<strong>Bit manipulation patterns:</strong><br>
• Set a bit: <code>reg |= (1 &lt;&lt; n)</code><br>
• Clear a bit: <code>reg &amp;= ~(1 &lt;&lt; n)</code><br>
• Toggle a bit: <code>reg ^= (1 &lt;&lt; n)</code><br>
• Read a bit: <code>(reg &gt;&gt; n) &amp; 1</code><br><br>
<strong>Read-modify-write hazard:</strong> Some registers have side effects on read (e.g., clearing interrupt flags). Read the datasheet carefully — some flags are cleared by writing 1 (W1C), not 0.`,

    summary: 'A hardware engine that transfers data between peripherals and memory without CPU involvement, freeing the processor for real work.',
    body: `The CPU is slow at bulk data movement — it fetches, processes, and stores one word at a time. The <strong>DMA controller</strong> has a dedicated bus to move blocks of data autonomously.<br><br>
<strong>How it works:</strong> You configure a DMA channel with a source address, destination address, transfer count, and data width. You trigger it (or it auto-triggers from a peripheral). The DMA raises an interrupt when done or on error.<br><br>
<strong>Use cases:</strong><br>

• Memory → SPI/UART TX buffer (zero-copy transmit)<br>
• Memory → memory (fast memcpy equivalent)<br>
• Audio: I2S → DMA → memory<br><br>
<strong>Cache coherency:</strong> On MPUs with data caches, DMA bypasses the cache. You must explicitly clean (flush) the cache before DMA reads, and invalidate it after DMA writes to memory. Failure causes stale data bugs that are notoriously hard to diagnose.<br><br>

    summary: 'Standardized electrical and logical interfaces for chip-to-chip and board-to-board communication.',
    body: `<strong>UART (Universal Async Receiver-Transmitter):</strong> Asynchronous, two wires (TX/RX), no shared clock. Both sides agree on baud rate. Simple but no multi-device support. Uses: debug consoles, GPS, Bluetooth modules.<br><br>
<strong>SPI (Serial Peripheral Interface):</strong> Synchronous, 4 wires (MOSI, MISO, SCK, CS per device). Full-duplex. Fast (up to 50+ MHz). Master/slave. One CS line per device. Uses: flash memory, displays, ADCs, accelerometers.<br><br>

    body: `Every embedded system has a boot chain. The first stage is often baked into the chip (ROM bootloader). It hands off to a secondary bootloader (your code or U-Boot), which then loads the application.<br><br>
<strong>Typical boot chain:</strong><br>

    summary: 'A software layer that decouples application logic from specific hardware, enabling portability across MCU families and boards.',
    body: `Without a HAL, your application code is full of raw register addresses — tied to one specific chip. A HAL wraps those accesses behind a portable API.<br><br>
<strong>Vendor HALs:</strong> STM32 HAL/LL (ST), nRF5 SDK (Nordic), ESP-IDF (Espressif), Zephyr device model. Generated by tools like STM32CubeMX. High-level, portable, but sometimes bloated.<br><br>
<strong>CMSIS (Cortex Microcontroller Software Interface Standard):</strong> ARM's standardized layer for Cortex-M: CMSIS-Core (CPU access), CMSIS-Driver (peripheral APIs), CMSIS-RTOS (RTOS abstraction). Enables code reuse across vendors.<br><br>

<strong>Trade-offs:</strong><br>

• Raw registers: maximum control and performance, zero portability<br><br>

    id: 'linker-script', cat: 'embed', name: 'Linker Script', aka: '.ld file, memory map, scatter file',
    summary: 'A script that controls how the linker places code and data sections into the target device\'s physical memory regions.',
    body: `The linker script is the authoritative map of your firmware's memory layout. Without it, the linker doesn't know where flash is, where RAM is, or how to arrange your code.<br><br>
<strong>Key sections:</strong><br>
• <code>.text</code> — executable code and constants → placed in flash<br>
• <code>.data</code> — initialized global/static variables → stored in flash, copied to RAM at startup<br>
• <code>.bss</code> — uninitialized globals/statics → zeroed in RAM at startup (no flash storage)<br>
• <code>.stack</code> / <code>.heap</code> — runtime memory in RAM<br><br>
<strong>MEMORY block:</strong> Defines named regions with origin and length — FLASH and SRAM for a typical MCU.<br><br>
<strong>Startup file dependency:</strong> The startup code uses linker-defined symbols (<code>_sdata</code>, <code>_edata</code>, <code>_sidata</code>) to know the source (flash) and destination (RAM) for copying <code>.data</code>. If your linker script is wrong, your global variables will have garbage values.<br><br>
<strong>Stack pointer:</strong> The reset vector's first word is the initial stack pointer value — also defined in the linker script as the top of SRAM.`,
    code: `/* Minimal ARM Cortex-M linker script */
MEMORY {
  FLASH (rx)  : ORIGIN = 0x08000000, LENGTH = 512K
  SRAM  (rwx) : ORIGIN = 0x20000000, LENGTH = 128K
}

SECTIONS {
  .text : {
    KEEP(*(.isr_vector))   /* interrupt vector table first */
    *(.text*)
    *(.rodata*)
  } > FLASH

  .data : {
    _sdata = .;
    *(.data*)
    _edata = .;
  } > SRAM AT > FLASH      /* stored in flash, runs in SRAM */

  _sidata = LOADADDR(.data); /* flash load address for startup copy */

  .bss : {
    _sbss = .;
    *(.bss*)
    _ebss = .;
  } > SRAM
}`,

    id: 'watchdog', cat: 'embed', name: 'Watchdog Timer', aka: 'WDT, IWDG, WWDG, hardware watchdog',
    summary: 'A hardware counter that resets the system if firmware fails to periodically "kick" it — your last line of defense against hangs.',
    body: `A watchdog timer counts down independently of the CPU. If the firmware gets stuck in an infinite loop, deadlock, or hard fault and fails to reset the counter before it reaches zero, the WDT triggers a system reset.<br><br>
<strong>Independent Watchdog (IWDG):</strong> Clocked from a separate low-speed oscillator (LSI). Runs even if the main clock fails. True last resort.<br><br>
<strong>Windowed Watchdog (WWDG):</strong> Must be kicked within a specific time window — not too early, not too late. Catches timing-precise failures.<br><br>
<strong>Kicking the watchdog:</strong> Write a refresh key to the watchdog register. Do this only from your main application loop or a dedicated watchdog task — never unconditionally in an ISR (that would defeat the purpose).<br><br>
<strong>In RTOS systems:</strong> A common pattern is a watchdog task at the highest priority that collects "alive" tokens from all other tasks. It kicks the WDT only when all tasks have checked in. A stalled task means the WDT fires.<br><br>
<strong>Safety systems:</strong> IEC 61508, ISO 26262, and similar standards require watchdog timers. A system that can be bricked by a software bug isn't certifiable.`,
    analogy: 'Like a dead man\'s switch on a train — the driver must keep pressing the pedal to prove they\'re conscious. If they stop, the train stops.',
    code: `// FreeRTOS watchdog pattern: task token checking
uint32_t taskAlive = 0;

// In each task:
taskAlive |= TASK_SENSOR_BIT;   // set my bit

// In watchdog task (highest priority):
void vWatchdogTask(void *p) {
  for (;;) {
    if (taskAlive == ALL_TASK_BITS) {
      HAL_IWDG_Refresh(&hiwdg); // kick
      taskAlive = 0;
    }
    vTaskDelay(pdMS_TO_TICKS(500));
  }
}`,

    id: 'power-management', cat: 'embed', name: 'Power Management', aka: 'Sleep modes, low-power, duty cycling, DVFS',
    summary: 'Techniques to minimize energy consumption in battery-powered or energy-harvesting embedded systems.',
    body: `Energy efficiency is a first-class constraint in embedded design. A coin-cell battery has ~240 mAh — a 10mA active device dies in a day; a 10μA sleeping device lasts years.<br><br>
<strong>MCU sleep modes (ARM Cortex-M example):</strong><br>
• <strong>Sleep:</strong> CPU halted, peripherals + SRAM active. Wakeup: any interrupt. Fastest resume.<br>
• <strong>Stop:</strong> CPU + most peripherals off, SRAM retained. Wakeup: EXTI, RTC. μA range.<br>
• <strong>Standby:</strong> Almost everything off, only RTC and backup registers retained. nA range. Full boot on wakeup.<br><br>
<strong>Duty cycling:</strong> Wake up, do work, sleep. The ratio of active to sleep time determines average current. A device awake 1% of the time uses ~1% of active-mode power.<br><br>
<strong>Clock gating:</strong> Disable peripheral clocks when not in use. On STM32, every peripheral clock is individually gated via RCC registers.<br><br>
<strong>DVFS (Dynamic Voltage and Frequency Scaling):</strong> Reduce CPU voltage and frequency during light workloads. Power scales with V² × f.<br><br>
<strong>Energy profiling tools:</strong> Nordic PPK2, Otii Arc, STM32 Current Consumption Calculator, oscilloscope + shunt resistor.`,

  {
    id: 'volatile-kw', cat: 'embed', name: 'volatile Keyword', aka: 'volatile qualifier, memory-mapped, ISR variable',
    summary: 'A C/C++ type qualifier that prevents the compiler from optimizing away accesses to hardware registers or ISR-shared variables.',
    body: `Without <code>volatile</code>, the compiler is free to assume a variable's value can only change through the code it can see. For hardware registers or variables modified in an ISR, this assumption is dead wrong.<br><br>
<strong>Two critical use cases:</strong><br><br>
1. <strong>Memory-mapped I/O registers:</strong> A hardware register's value changes independently of your code (a UART receive buffer fills up, a GPIO input changes). Without volatile, the compiler caches the first read in a CPU register and never re-reads memory — your code sees stale data forever.<br><br>
2. <strong>ISR-shared flags:</strong> The main loop reads a flag that the ISR sets. Without volatile, the compiler may hoist the flag read out of the loop entirely — <code>while (!flag)</code> becomes an infinite loop.<br><br>
<strong>What volatile does NOT do:</strong> It does not guarantee atomicity. On most MCUs, reading a 32-bit value from a 16-bit bus requires two bus cycles — an interrupt between them gives a torn read. Use atomic types, critical sections, or disable interrupts for multi-byte shared data.<br><br>
<strong>Compiler flags:</strong> <code>-O2</code> and higher aggressively reorder and eliminate non-volatile accesses. Always compile embedded code with volatile where needed, and test at full optimization.`,
    code: `// MMIO: compiler MUST read the register every time
volatile uint32_t *const UART_SR = (volatile uint32_t*)0x40011000;
while (!(*UART_SR & UART_SR_RXNE)); // wait for byte

// ISR-shared flag: must be volatile
volatile uint8_t dataReady = 0;

void USART1_IRQHandler(void) {
  rxBuf[rxIdx++] = USART1->DR;
  if (rxIdx >= MSG_LEN) dataReady = 1; // ISR sets flag
}

int main(void) {
  while (!dataReady);  // main loop reads flag — volatile required!
  processData();
}`,

    id: 'cross-compilation', cat: 'embed', name: 'Cross-Compilation', aka: 'toolchain, arm-none-eabi-gcc, target triplet',
    summary: 'Building firmware on a host machine (e.g., x86 Linux) for a different target architecture (e.g., ARM Cortex-M).',
    body: `Your laptop is x86_64. Your MCU is ARM Cortex-M4. The compiler produces machine code for the CPU it runs on — so you need a <strong>cross-compiler</strong> that runs on x86 but emits ARM instructions.<br><br>
<strong>Target triplet:</strong> Identifies the target: <code>arm-none-eabi</code> = ARM architecture, no vendor, no OS (bare-metal), ELF ABI. The compiler binary is <code>arm-none-eabi-gcc</code>.<br><br>
<strong>Key tools in the ARM toolchain:</strong><br>

• <code>arm-none-eabi-g++</code> — C++ compiler<br>
• <code>arm-none-eabi-ld</code> — linker<br>
• <code>arm-none-eabi-objcopy</code> — convert ELF → binary/hex for flashing<br>
• <code>arm-none-eabi-size</code> — show flash/RAM usage<br>
• <code>arm-none-eabi-gdb</code> — debugger (used with OpenOCD)<br><br>
<strong>Build systems:</strong> CMake with a toolchain file is the modern standard. Makefiles are common in legacy projects. IDEs (STM32CubeIDE, SEGGER Embedded Studio) wrap the toolchain.<br><br>
<strong>FPU flags:</strong> For Cortex-M4F, you must pass <code>-mfpu=fpv4-sp-d16 -mfloat-abi=hard</code> to use the hardware floating-point unit. Wrong flags = software FP emulation = 10× slower.`,

    body: `Software debugging tools like <code>printf</code> are limited — they need a working UART and don't help when the system crashes at startup. JTAG and SWD give you a hardware window into the running CPU.<br><br>
<strong>JTAG:</strong> IEEE 1149.1 standard. 4-5 wires (TDI, TDO, TCK, TMS, optional TRST). Chain-able — multiple devices on one JTAG chain. Supports boundary scan (board-level hardware testing).<br><br>
<strong>SWD (Serial Wire Debug):</strong> ARM's 2-wire alternative (SWDIO, SWCLK). Functionally equivalent to JTAG for debugging Cortex-M. Preferred for space-constrained boards.<br><br>
<strong>Typical debug stack:</strong><br>

  {
    id: 'fpga-arch', cat: 'fpga', name: 'FPGA Architecture', aka: 'Field-Programmable Gate Array, LUT, CLB, BRAM, DSP slice',
    summary: 'A reconfigurable silicon chip composed of programmable logic blocks, routing fabric, and hard IP — you define the hardware by loading a bitstream.',
    body: `An FPGA is not a processor running software — it's a sea of configurable hardware primitives wired together by a programmable interconnect. You describe the circuit; the FPGA <em>becomes</em> that circuit.<br><br>
<strong>Core primitives:</strong><br>
• <strong>LUT (Look-Up Table):</strong> A small truth table stored in SRAM. A 6-input LUT can implement any combinational function of 6 inputs. The fundamental logic element.<br>
• <strong>Flip-Flop (FF):</strong> A D flip-flop co-located with each LUT. Captures LUT output on clock edge — implements registers and sequential logic.<br>
• <strong>CLB / Slice (Xilinx) / ALM (Intel):</strong> A cluster of LUTs + FFs + carry-chain logic forming the basic programmable logic tile.<br>
• <strong>BRAM (Block RAM):</strong> Dedicated dual-port SRAM blocks (typically 18Kb or 36Kb each). Used for FIFOs, frame buffers, lookup tables, instruction memory.<br>
• <strong>DSP Slice:</strong> Hard multiplier-accumulator block (18×18 or 27×18 multiply + adder). Implements filters, correlators, and arithmetic far more efficiently than LUTs.<br>
• <strong>Routing fabric:</strong> Programmable switch matrix connecting all elements. Routing delay is often the dominant timing path — good floorplanning matters.<br><br>
<strong>Hard IP blocks:</strong> High-speed serial transceivers (PCIe, JESD204B), DRAM controllers (MIG), PLLs/MMCMs for clock generation — these are fixed silicon, not LUT-based.`,
    analogy: 'Like a city of empty lots (LUTs) connected by programmable roads (routing). Your HDL is the zoning plan — it decides what building goes on each lot and which roads connect them.',

  {
    id: 'hdl-mindset', cat: 'fpga', name: 'HDL vs Programming', aka: 'Hardware description language, concurrent execution, RTL mindset',
    summary: 'HDL code describes hardware structure and concurrent signal flow — not a sequence of instructions for a CPU to execute.',
    body: `The single biggest mistake new HDL designers make is thinking in software. In C, statements execute one after another. In Verilog, <strong>everything is concurrent</strong> — all <code>always</code> blocks and <code>assign</code> statements run simultaneously, every clock cycle.<br><br>
<strong>You are not programming — you are describing hardware:</strong><br>
• Every <code>reg</code> and <code>wire</code> is a physical signal<br>
• Every <code>always @(posedge clk)</code> is a bank of flip-flops<br>
• Every <code>assign</code> is a combinational gate network<br>
• <code>if/else</code> in combinational logic becomes multiplexers<br>
• <code>for</code> loops <em>unroll</em> at synthesis time — they generate hardware, not iterations<br><br>
<strong>RTL (Register Transfer Level):</strong> The abstraction level between gates and behavior. You describe data flowing between registers through combinational logic. The synthesizer maps this to LUTs and FFs.<br><br>
<strong>Simulation vs Synthesis:</strong> Some Verilog constructs simulate correctly but cannot be synthesized (e.g., <code>#10</code> delays, <code>initial</code> blocks, <code>$display</code>). Always ask: "can this be made out of LUTs and flip-flops?"<br><br>
<strong>Hierarchy:</strong> Designs are built from modules — each module is a hardware block with ports. Modules instantiate other modules, building a design hierarchy from primitives up to system level.`,
    analogy: 'Writing Verilog is like designing a factory floor layout — you decide which machines exist and how conveyor belts connect them. The factory runs everything in parallel, all the time.',
    tags: ['RTL', 'concurrent', 'synthesis', 'simulation', 'module', 'wire', 'reg', 'always', 'assign'],
    related: ['verilog-sv', 'combinational', 'sequential', 'synthesis-flow']
  },
  {
    id: 'verilog-sv', cat: 'fpga', name: 'Verilog & SystemVerilog', aka: 'Verilog-2001, SV, IEEE 1364, IEEE 1800',
    summary: 'The dominant HDLs for FPGA and ASIC design — Verilog for RTL, SystemVerilog for advanced RTL and verification.',
    body: `<strong>Verilog (IEEE 1364):</strong> The original HDL, dating to 1984. Concise and widely synthesizable. Verilog-2001 is the pragmatic standard — adds <code>always @(*)</code>, port declarations in module header, generate blocks.<br><br>
<strong>SystemVerilog (IEEE 1800):</strong> A superset of Verilog. Adds:<br>
• RTL: <code>logic</code> type (replaces reg/wire ambiguity), <code>always_ff</code>/<code>always_comb</code>/<code>always_latch</code>, enums, structs, packed arrays, interfaces<br>
• Verification: classes, randomization, covergroups, assertions (SVA), constrained-random testbenches, OOP<br><br>
<strong>Key RTL constructs:</strong><br>
• <code>module / endmodule</code> — hardware block with ports<br>
• <code>wire</code> — combinational net (driven by assign or module output)<br>
• <code>reg</code> / <code>logic</code> — holds value (synthesizes to FF if in clocked always block)<br>
• <code>assign</code> — continuous combinational assignment<br>
• <code>always_ff @(posedge clk)</code> — register inference<br>
• <code>always_comb</code> — combinational logic block<br>
• <code>parameter</code> / <code>localparam</code> — compile-time constants<br>
• <code>generate</code> — conditional or repeated hardware instantiation<br><br>
<strong>VHDL:</strong> The alternative HDL — strongly typed, verbose, favored in Europe and defense/aerospace. Functionally equivalent at RTL level.`,
    code: `// SystemVerilog: parameterized register with sync reset
module reg_n #(parameter WIDTH = 8) (
  input  logic             clk, rst_n,
  input  logic [WIDTH-1:0] d,
  output logic [WIDTH-1:0] q
);
  always_ff @(posedge clk or negedge rst_n)
    if (!rst_n) q <= '0;
    else        q <= d;
endmodule

// Instantiation
reg_n #(.WIDTH(16)) u_reg (
  .clk(clk), .rst_n(rst_n), .d(data_in), .q(data_out)
);`,
    tags: ['SystemVerilog', 'Verilog', 'VHDL', 'logic', 'always_ff', 'always_comb', 'module', 'parameter', 'generate', 'interface'],

  {
    id: 'combinational', cat: 'fpga', name: 'Combinational Logic', aka: 'combinatorial, assign, always_comb, gates, mux',
    summary: 'Logic whose output depends only on current inputs — no memory, no clock. Implemented as LUT networks in an FPGA.',
    body: `Combinational logic computes an output purely as a function of current inputs. Change an input, and the output changes after a propagation delay (nanoseconds through LUT chains).<br><br>
<strong>Two ways to express combinational logic in SV:</strong><br><br>
1. <strong><code>assign</code> statement:</strong> Continuous assignment. Synthesizes to a net of gates. Best for simple expressions.<br>
2. <strong><code>always_comb</code> block:</strong> All signals read inside auto-trigger the sensitivity list. For complex mux trees, priority encoders, decoders.<br><br>
<strong>Critical pitfall — Incomplete sensitivity list / Inferred latch:</strong> In a combinational <code>always</code> block, if an output isn't assigned in every branch, the synthesizer infers a <strong>latch</strong> (level-sensitive storage) to hold the previous value. Latches are almost always a bug in synchronous designs. <code>always_comb</code> prevents this — it warns if a latch would be inferred. Always assign defaults before conditional logic.<br><br>
<strong>Priority vs parallel:</strong> Nested <code>if/else</code> creates a priority chain (each mux feeds the next — more logic, longer path). <code>case</code> creates parallel muxes (tool may optimize to one-hot select). Use <code>unique case</code> in SV to assert mutual exclusivity and enable optimization.`,
    code: `// assign: simple combinational
assign sum   = a + b;
assign carry = (a & b) | (a & cin) | (b & cin);

// always_comb: mux with default (no latch)
always_comb begin
  y = 4'b0000;        // default — prevents latch
  unique case (sel)
    2'b00: y = a;
    2'b01: y = b;
    2'b10: y = c;
    2'b11: y = d;
  endcase
end

// Priority encoder
always_comb begin
  enc = 3'd0;         // default
  if      (req[7]) enc = 3'd7;
  else if (req[6]) enc = 3'd6;
  // ...
end`,
    tags: ['LUT', 'assign', 'always_comb', 'mux', 'latch', 'priority encoder', 'decoder', 'propagation delay', 'unique case'],
    related: ['sequential', 'verilog-sv', 'timing-constraints', 'hdl-mindset']
  },
  {
    id: 'sequential', cat: 'fpga', name: 'Sequential Logic & Clocking', aka: 'flip-flop, register, pipeline, always_ff, synchronous design',
    summary: 'Logic with memory — outputs depend on both current inputs and past state, updated on a clock edge.',
    body: `Sequential logic adds memory to combinational logic. The clock edge is the heartbeat of a synchronous design — all state changes happen simultaneously on the rising (or falling) edge.<br><br>
<strong>The golden rule of synchronous design:</strong> All flip-flop inputs must be stable for <em>setup time</em> before the clock edge and hold stable for <em>hold time</em> after. Violate this and you get metastability — a FF stuck in an undefined state.<br><br>
<strong>Reset strategies:</strong><br>
• <strong>Synchronous reset:</strong> <code>if (rst)</code> inside the clocked block. Clean timing, but requires a clock to reset.<br>
• <strong>Asynchronous reset:</strong> <code>@(posedge clk or posedge rst)</code>. Resets immediately, no clock needed. Requires careful CDC handling of the reset deassertion.<br><br>
<strong>Pipelining:</strong> Insert registers between combinational stages to break long logic paths. Each stage takes one cycle — latency increases, but clock frequency (throughput) increases dramatically. The foundation of high-performance RTL design.<br><br>
<strong>Enable signals:</strong> A register with a clock enable (<code>if (en) q &lt;= d</code>) synthesizes to a FF with CE pin — no extra mux on the data path, just gating the FF's clock enable. More efficient than a mux feeding a free-running FF.`,
    code: `// D flip-flop with sync reset and enable
always_ff @(posedge clk) begin
  if (rst)     q <= '0;
  else if (en) q <= d;
end

// 4-stage pipeline register
always_ff @(posedge clk) begin
  pipe[0] <= data_in;
  pipe[1] <= pipe[0];
  pipe[2] <= pipe[1];
  pipe[3] <= pipe[2];
  // data_in appears at pipe[3] 4 cycles later
end

// Counter with overflow detection
always_ff @(posedge clk) begin
  if (rst)            count <= '0;
  else if (count_en)  count <= count + 1'b1;
end
assign overflow = (count == MAX_COUNT);`,
    tags: ['flip-flop', 'register', 'pipeline', 'clock enable', 'reset', 'synchronous', 'setup time', 'hold time', 'metastability'],
    related: ['combinational', 'timing-constraints', 'cdc', 'fsm']
  },
  {
    id: 'fsm', cat: 'fpga', name: 'Finite State Machines', aka: 'FSM, Mealy, Moore, one-hot, state machine',
    summary: 'A design pattern for sequencing control logic through a set of discrete states, fundamental to digital hardware design.',
    body: `FSMs are the primary tool for implementing control logic — protocols, arbiters, parsers, sequence detectors. Every non-trivial digital design has at least one FSM.<br><br>
<strong>Moore vs Mealy:</strong><br>
• <strong>Moore:</strong> Outputs depend only on current state. Clean, glitch-free outputs. Extra state may be needed.<br>
• <strong>Mealy:</strong> Outputs depend on state AND current inputs. Faster response (output changes in same cycle as input), but outputs can glitch with input noise.<br><br>
<strong>State encoding:</strong><br>
• <strong>Binary:</strong> Fewest FFs (log₂N), but more combinational logic for next-state decode<br>
• <strong>One-hot:</strong> One FF per state, only one FF active. More FFs, but simpler (and faster) decode logic — preferred for FPGA where FFs are plentiful<br>
• <strong>Gray code:</strong> Only one bit changes between adjacent states — useful for async applications and low-EMI designs<br><br>
<strong>Three-block style (recommended):</strong><br>
1. State register — <code>always_ff</code>, state ← next_state<br>
2. Next-state logic — <code>always_comb</code>, combinational decode of current state + inputs<br>
3. Output logic — <code>always_comb</code> (Moore) or separate (Mealy)<br><br>
<strong>Tool directive:</strong> Use <code>// synthesis full_case parallel_case</code> or <code>unique case</code> in SV to allow synthesis optimization and catch unhandled states.`,
    code: `// One-hot FSM: simple UART TX controller
typedef enum logic [2:0] {
  IDLE  = 3'b001,
  START = 3'b010,
  DATA  = 3'b100
} state_t;

state_t state, next;

// 1) State register
always_ff @(posedge clk)
  state <= next;

// 2) Next-state logic
always_comb begin
  next = state;
  unique case (state)
    IDLE:  if (send)   next = START;
    START:             next = DATA;
    DATA:  if (done)   next = IDLE;
  endcase
end

// 3) Moore outputs
assign tx_active = (state != IDLE);`,
    tags: ['FSM', 'Moore', 'Mealy', 'one-hot', 'binary encoding', 'Gray code', 'state register', 'next-state', 'enum'],
    related: ['sequential', 'verilog-sv', 'combinational']
  },
  {
    id: 'timing-constraints', cat: 'fpga', name: 'Timing & Constraints', aka: 'setup time, hold time, SDC, timing closure, critical path, slack',
    summary: 'Specifying and meeting timing requirements that guarantee flip-flops sample stable data — the difference between a working design and random bit errors.',
    body: `Every flip-flop has two requirements relative to its clock edge:<br>
• <strong>Setup time (Tsu):</strong> Data must be stable at least Tsu <em>before</em> the clock edge<br>
• <strong>Hold time (Th):</strong> Data must remain stable at least Th <em>after</em> the clock edge<br><br>
<strong>Setup slack = clock period − (data path delay + Tsu).</strong> Negative slack = timing failure = wrong data captured.<br><br>
<strong>SDC (Synopsys Design Constraints):</strong> The industry-standard format for timing constraints, used by Vivado, Quartus, DC, and others.<br>
Key constraints:<br>
• <code>create_clock</code> — defines clock period and waveform<br>
• <code>set_input_delay</code> / <code>set_output_delay</code> — I/O timing relative to clock<br>
• <code>set_false_path</code> — tells the tool to ignore a path (e.g., static config, CDC paths)<br>
• <code>set_multicycle_path</code> — relaxes timing for paths that take multiple cycles<br><br>
<strong>Critical path:</strong> The longest combinational path between two registers — it sets the maximum clock frequency. To fix: pipeline (insert a register mid-path), recode the logic, or retiming (tool-assisted FF repositioning).<br><br>
<strong>Timing closure:</strong> Iterative process of running synthesis + place & route, analyzing reports, fixing violations, repeating. At high frequencies this dominates project schedules.`,
    code: `# SDC constraint file (Vivado / Quartus)

set_output_delay -clock clk_sys 1.0 [get_ports data_out]

  {
    id: 'cdc', cat: 'fpga', name: 'Clock Domain Crossing', aka: 'CDC, metastability, synchronizer, FIFO, handshake',
    summary: 'Safely passing signals between logic running on different clocks — the source of some of the nastiest, hardest-to-reproduce hardware bugs.',
    body: `When a flip-flop clocked by domain A drives a flip-flop clocked by domain B, setup/hold time can be violated at any time — the phase relationship between clocks is undefined. The receiving FF enters <strong>metastability</strong>: an indeterminate voltage that eventually resolves, but may take longer than one clock period, causing a wrong value to propagate.<br><br>
<strong>Mean Time Between Failures (MTBF):</strong> Metastability is probabilistic. Proper synchronization makes MTBF billions of years; improper crossing makes it seconds.<br><br>
<strong>Solutions by signal type:</strong><br><br>
<strong>Single-bit control signals:</strong> Two-flop synchronizer — two back-to-back FFs in the destination domain. The first FF may metastabilize; the second samples after a full clock period, giving the voltage time to resolve. Never use a single FF.<br><br>
<strong>Multi-bit data / buses:</strong> Gray-code counter (only 1 bit changes per increment — safe to synchronize) for pointers, or a full <strong>asynchronous FIFO</strong> with Gray-coded read/write pointers.<br><br>
<strong>Handshake:</strong> Req/Ack protocol — sender asserts req, waits for ack from receiver. Both signals pass through two-flop synchronizers. Safe but slow.<br><br>
<strong>CDC static analysis:</strong> Tools like Questa CDC, SpyGlass, and Meridian check for unsynchronized crossings. Timing analysis alone won't catch CDC bugs — <code>set_false_path</code> hides them from the timing engine.`,
    code: `// Two-flop synchronizer for single control bit
module sync_2ff (
  input  logic clk_dst, async_in,
  output logic sync_out
);
  logic meta;
  // Instruct tool: these FFs must be placed close together
  (* ASYNC_REG = "TRUE" *) logic [1:0] sync_pipe;

  always_ff @(posedge clk_dst) begin
    sync_pipe[0] <= async_in;     // may metastabilize
    sync_pipe[1] <= sync_pipe[0]; // resolves here
  end
  assign sync_out = sync_pipe[1];
endmodule`,

    body: `Getting from Verilog to a running FPGA involves several distinct stages, each with its own reports and failure modes:<br><br>

    id: 'axi', cat: 'fpga', name: 'AXI & IP Integration', aka: 'AXI4, AXI-Lite, AXI-Stream, AMBA, IP core, block design',
    summary: 'The ARM AMBA AXI bus protocol — the universal glue connecting IP blocks inside Xilinx, Intel, and custom FPGA designs.',
    body: `Modern FPGA designs are assembled from IP blocks — vendor-supplied or custom — connected by standardized buses. AXI (Advanced eXtensible Interface) is the dominant standard, part of the ARM AMBA spec.<br><br>
<strong>Three AXI variants:</strong><br>
• <strong>AXI4 (full):</strong> High-performance memory-mapped, burst transactions up to 256 beats. For DDR controllers, DMA engines, high-bandwidth peripherals.<br>
• <strong>AXI4-Lite:</strong> Simplified, single-transfer only. No bursts. Perfect for control/status register banks, low-bandwidth peripherals. Easy to implement from scratch.<br>
• <strong>AXI4-Stream:</strong> Unidirectional streaming data — no addresses. Just TDATA, TVALID, TREADY (and optional TKEEP, TLAST). Used for video pipelines, DSP chains, packet processing.<br><br>
<strong>Handshake protocol:</strong> All AXI channels use VALID/READY handshake. A transfer occurs when both VALID (sender) and READY (receiver) are high on a clock edge. Either side can stall by deasserting its signal.<br><br>
<strong>IP cores:</strong> Pre-built parameterized modules (Xilinx Catalog, Intel IP Library) for DDR4 controllers, PCIe, Ethernet MACs, FIFOs, clocking wizards, video processing. Assembled graphically in Vivado Block Design or Quartus Platform Designer.<br><br>
<strong>Custom AXI-Lite slave:</strong> The most common thing to implement — a register bank the CPU can read/write over AXI to control your custom logic.`,
    code: `// AXI4-Stream passthrough (TVALID/TREADY handshake)
module axis_passthrough #(parameter DATA_W = 32) (
  input  logic                  clk, rst_n,
  // Slave (input) port
  input  logic [DATA_W-1:0]     s_tdata,
  input  logic                  s_tvalid,
  input  logic                  s_tlast,
  output logic                  s_tready,
  // Master (output) port
  output logic [DATA_W-1:0]     m_tdata,
  output logic                  m_tvalid,
  output logic                  m_tlast,
  input  logic                  m_tready
);
  // Transfer when both valid and ready
  assign s_tready = m_tready;
  assign m_tvalid = s_tvalid;
  assign m_tdata  = s_tdata;
  assign m_tlast  = s_tlast;
endmodule`,

    body: `<strong>FPGA (Field-Programmable Gate Array):</strong><br>

    id: 'actor-model', cat: 'dist', name: 'Actor Model', aka: 'Actors, Erlang, Akka, Elixir, message passing',
    summary: 'A concurrency model where independent "actors" communicate exclusively through asynchronous messages — no shared memory, no locks.',
    body: `The Actor Model treats <strong>actors</strong> as the fundamental unit of computation. Each actor has a private mailbox, private state, and processes one message at a time. Actors can: send messages to other actors, create new actors, and decide how to handle the next message.<br><br>
<strong>Why it matters:</strong> Traditional shared-memory concurrency (threads + locks) forces you to reason about who holds which lock when. The actor model eliminates shared state entirely — no deadlocks, no race conditions on shared data. Failures are isolated to individual actors.<br><br>
<strong>Key properties:</strong><br>
• <strong>Isolation:</strong> Actor state is private. The only way to affect another actor is to send it a message.<br>
• <strong>Asynchronous:</strong> Sending a message never blocks the sender. Fire and forget (or use ask pattern for a reply).<br>
• <strong>Location transparency:</strong> You send to an actor reference — it doesn't matter if that actor is on the same thread, same machine, or across the network. The runtime routes it.<br>
• <strong>Supervision trees:</strong> Actors are organized in parent-child hierarchies. Parent actors supervise children and decide what to do when a child crashes: restart it, stop it, or escalate. "Let it crash" philosophy (Erlang).<br><br>
<strong>Implementations:</strong> Erlang/OTP (the original, telecom-grade), Elixir (Erlang VM, modern syntax), Akka (JVM, Scala/Java), Akka.NET, Microsoft Orleans (virtual actors / grains — no explicit lifecycle management).`,

}

    id: 'saga-pattern', cat: 'dist', name: 'Saga Pattern', aka: 'Distributed transaction, compensating transaction, choreography, orchestration',
    summary: 'A way to manage data consistency across multiple microservices without a distributed transaction — chain local transactions with compensating rollbacks.',
    body: `In a monolith, a database transaction gives you ACID across multiple tables. In microservices, each service owns its database — you can't have a single transaction span service boundaries. The Saga pattern solves this.<br><br>
<strong>How it works:</strong> A saga is a sequence of local transactions. Each step publishes an event or sends a command triggering the next step. If any step fails, compensating transactions run in reverse to undo previous steps.<br><br>
<strong>Two coordination styles:</strong><br><br>
<strong>Choreography:</strong> No central coordinator. Each service listens for events and publishes its own events in response. Decoupled, but the overall flow is implicit — hard to observe and debug. Works well for simple flows.<br><br>
<strong>Orchestration:</strong> A central saga orchestrator (a service or workflow engine) explicitly commands each participant and handles failures. The flow is explicit and visible. Easier to reason about, but the orchestrator becomes a new dependency. Tools: Temporal, AWS Step Functions, Conductor.<br><br>
<strong>Compensating transactions:</strong> Must be explicitly designed — "cancel order", "refund payment", "release inventory". They're not automatic rollbacks; they're business operations that undo the effect of a previous step. Not all operations are easily compensable (e.g., sending an email).<br><br>
<strong>Idempotency is critical:</strong> Messages can be redelivered. Every step must be safe to execute more than once — use idempotency keys.`,
    analogy: 'Booking a trip: you book flight, hotel, and car separately. If the car rental fails, you cancel the hotel and flight — each cancellation is a compensating transaction. A travel agent (orchestrator) coordinates it; booking sites talking to each other is choreography.',
    code: `// Orchestration saga (pseudocode — Temporal-style workflow)
async function orderSaga(order) {
  let paymentId, inventoryId;
  try {
    paymentId   = await activity.chargePayment(order);
    inventoryId = await activity.reserveInventory(order);
    await activity.scheduleShipment(order);
  } catch (err) {
    // compensate in reverse
    if (inventoryId) await activity.releaseInventory(inventoryId);
    if (paymentId)   await activity.refundPayment(paymentId);
    throw err;
  }
}`,

    id: 'ddd', cat: 'arch', name: 'Domain-Driven Design', aka: 'DDD, bounded context, aggregate, ubiquitous language, Eric Evans',
    summary: 'An approach to software design that centers the model on the business domain — shared language, clear boundaries, and domain logic that belongs to the domain.',
    body: `DDD (Eric Evans, 2003) is less about code patterns and more about how you think about and structure systems around their business domain.<br><br>
<strong>Ubiquitous Language:</strong> Developers and domain experts use the exact same vocabulary. The code uses the same terms the business uses. If the business says "booking," the code has a <code>Booking</code> class — not <code>ReservationRecord</code>.<br><br>
<strong>Bounded Context:</strong> A clear boundary within which a domain model is defined and consistent. The same word ("Order") can mean different things in different contexts (Sales vs Fulfillment vs Billing). Bounded contexts map roughly to microservices, teams, or code modules.<br><br>
<strong>Aggregate:</strong> A cluster of domain objects treated as a single unit for data changes. Has a root entity (Aggregate Root) that controls all access. All writes go through the root — enforces invariants. E.g., an Order aggregate contains OrderLines; you never mutate an OrderLine directly.<br><br>
<strong>Entities vs Value Objects:</strong><br>
• <strong>Entity:</strong> Has a unique identity that persists over time (User, Order). Two users with the same name are different entities.<br>
• <strong>Value Object:</strong> Defined by its attributes, no identity (Money, Address, DateRange). Immutable. Two $10 bills are identical.<br><br>
<strong>Domain Events:</strong> Things that happened in the domain, named in past tense (<code>OrderPlaced</code>, <code>PaymentFailed</code>). Published when aggregates change state. The bridge between bounded contexts.<br><br>
<strong>Strategic vs Tactical DDD:</strong> Strategic = bounded contexts, context maps, team topology. Tactical = aggregates, entities, value objects, repositories, domain services.`,

    id: 'event-sourcing', cat: 'arch', name: 'Event Sourcing', aka: 'event store, append-only log, projection, snapshot',
    summary: 'Store the full history of state changes as an immutable sequence of events — current state is derived by replaying them.',
    body: `Traditional databases store current state: "the order total is $150." Event sourcing stores what happened: <code>OrderCreated</code>, <code>ItemAdded($50)</code>, <code>ItemAdded($100)</code>. Current state is a projection of the event log.<br><br>
<strong>Benefits:</strong><br>
• <strong>Complete audit trail:</strong> You always know exactly what happened and when. Compliance and debugging become dramatically easier.<br>
• <strong>Temporal queries:</strong> "What did the system look like last Tuesday?" Replay events up to any point in time.<br>
• <strong>Event-driven integration:</strong> Events are the source of truth — other services subscribe to them. No dual-write problem.<br>
• <strong>Bug recovery:</strong> Fix a bug in projection logic and rebuild the read model from scratch by replaying all events.<br><br>
<strong>Projections (Read Models):</strong> Derived views of event history optimized for queries. One event stream can feed many projections — a denormalized "orders by customer" view, a dashboard count, an analytics feed. This is where CQRS integrates naturally.<br><br>
<strong>Snapshots:</strong> For aggregates with thousands of events, replaying from zero is slow. Periodically snapshot current state + event sequence number; replay starts from the snapshot.<br><br>
<strong>Challenges:</strong> Event schema evolution (what if you need to change the shape of old events?), eventual consistency of projections, operational complexity of the event store. Not appropriate for simple CRUD systems.`,

    code: `// Event sourcing: aggregate rehydration from events

    for (const event of events) order.apply(event);

  {
    id: 'outbox-pattern', cat: 'arch', name: 'Outbox Pattern', aka: 'transactional outbox, at-least-once delivery, Debezium, CDC',
    summary: 'Guarantee that database writes and message publishes happen together atomically — eliminating the dual-write problem.',
    body: `The dual-write problem: you save to your database, then publish an event to Kafka. What if the service crashes between the two? Database is updated, event is never published — your system is inconsistent.<br><br>
<strong>The Outbox Pattern solves this:</strong><br>
1. In the same database transaction that updates your domain data, also write the event to an <strong>outbox table</strong>.<br>
2. A separate process (message relay) reads the outbox table and publishes events to the message broker.<br>
3. Mark published events as processed (or delete them).<br><br>
The database transaction is the atomicity boundary — either both the domain update and the outbox write happen, or neither does. No lost events.<br><br>
<strong>Message Relay approaches:</strong><br>
• <strong>Polling publisher:</strong> A thread queries the outbox table every N seconds for unpublished events. Simple but adds database load and latency.<br>
• <strong>CDC (Change Data Capture):</strong> A tool like Debezium tails the database's transaction log (binlog/WAL) and publishes changes as events. Near-realtime, no polling, no extra DB load.<br><br>
<strong>Idempotent consumers:</strong> Even with the outbox, the relay can deliver a message more than once (network retry, relay restart). Consumers must handle duplicate events safely — deduplicate by event ID.<br><br>
<strong>Inbox pattern (dual):</strong> On the consumer side, write incoming messages to a local inbox table before processing — same atomicity guarantee in reverse.`,
    analogy: 'Like dropping a letter in an office outbox tray and having a mail room that reliably delivers it — instead of trying to run to the post office yourself mid-task and risking forgetting it.',

        '{"orderId": "123", "customerId": "456"}', false);

COMMIT;

-- Relay query (polling publisher)
SELECT * FROM outbox WHERE published = false ORDER BY created_at LIMIT 100;`,

    id: 'hexagonal-arch', cat: 'arch', name: 'Hexagonal Architecture', aka: 'Ports & Adapters, Clean Architecture, Onion Architecture',
    summary: 'Structure your application so that business logic is the center — all I/O (databases, APIs, UIs, queues) is a pluggable adapter at the edge.',
    body: `Alistair Cockburn's Hexagonal Architecture (2005) has one core idea: <strong>the domain must not depend on infrastructure</strong>. Your business logic should be the same whether it's called by an HTTP request, a CLI, a test, or a queue consumer.<br><br>
<strong>Ports:</strong> Interfaces defined by the application core — the "shape" of what the application needs from the outside world. Two kinds:<br>
• <strong>Driving ports (primary):</strong> How the outside world drives your application (e.g., <code>OrderService.placeOrder()</code>)<br>
• <strong>Driven ports (secondary):</strong> What your application needs from infrastructure (e.g., <code>OrderRepository.save()</code>, <code>EmailSender.send()</code>)<br><br>
<strong>Adapters:</strong> Concrete implementations of ports. A REST controller is a driving adapter. A PostgreSQL repository is a driven adapter. A Kafka consumer is a driving adapter. An S3 client is a driven adapter.<br><br>
<strong>The dependency rule:</strong> Dependencies always point inward — adapters depend on ports, ports are defined by the core, the core depends on nothing outside itself.<br><br>
<strong>Why it matters:</strong><br>
• Swap a PostgreSQL adapter for an in-memory adapter in tests — no database needed<br>
• Change from REST to gRPC by writing a new adapter, zero core changes<br>
• Test business logic without spinning up any infrastructure<br><br>
<strong>Clean Architecture (Uncle Bob) and Onion Architecture</strong> express the same idea with different naming. All share the dependency inversion principle at their heart.`,

  constructor(private repo: OrderRepository) {}
  async execute(cmd: PlaceOrderCommand) {
    const order = Order.create(cmd);
    await this.repo.save(order);   // calls the port

  }
}

// Infrastructure adapter implements the port
class PostgresOrderRepository implements OrderRepository {
